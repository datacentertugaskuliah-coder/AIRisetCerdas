0% internasional bereputasi + 20% SINTA 1-2, mutakhir dan\n  primer (R5).\n\nPROTOKOL KANVAS BARU (WAJIB) — MENJAGA BATAS/LIMIT\n================================================================\nATURAN INTI (tidak dapat dilanggar):\n1. SATU KANVAS = SATU BAB. Jangan menggabungkan dua bab dalam satu kanvas, dan\n   jangan menambahkan bab baru ke kanvas yang sudah terisi.\n2. SEBELUM menulis bab berikutnya, BUAT KANVAS/DOKUMEN BARU lebih dulu. Beri\n   judul dengan prefiks kode sesi, contoh: \"[KODE] - BAB 2\".\n3. SELESAIKAN satu bab penuh dalam satu kanvas. JANGAN memulai bab berikutnya\n   pada respons yang sama; berhenti dan tunggu aba-aba \"LANJUT\".\n4. Jika ruang kanvas mulai menipis di TENGAH bab, jangan memadatkan atau\n   memotong. Tutup dengan \"[BERSAMBUNG — ketik LANJUT untuk sisa bab ini di\n   kanvas baru]\" lalu lanjutkan di kanvas baru saat diminta.\n5. JANGAN menulis ulang bab yang sudah selesai; cukup rujuk judulnya.\n\nPEMETAAN ISTILAH LINTAS-AI:\n   ChatGPT -> Canvas baru | Claude -> Artifact baru | Gemini -> Canvas baru\n   Lainnya -> dokumen/jawaban terpisah baru\nFALLBACK: jika platform tidak mendukung kanvas terpisah, tulis tiap bab sebagai\nblok berjudul jelas dipisah garis, satu bab per respons.\n\nPEMBAGIAN KANVAS SADAR-TAHAP (R1-warisan):\n   TAHAP 1 (Seminar Proposal) -> 3 kanvas: Bab 1, Bab 2, Bab 3.\n   TAHAP 2 (Seminar Hasil)    -> 5 kanvas: Bab 1, Bab 2, Bab 3, Bab 4, Bab 5.\n   Jika TAHAP 1 dipilih: JANGAN memunculkan kerangka Bab 4 dan Bab 5.\n\nKONSISTENSI ANTAR-KANVAS (WAJIB sama di semua kanvas):\n   KODE SESI, penomoran, GLOSARIUM Modul 1, bidang, jenis penelitian, hipotesis/\n   proposisi, dan rumusan masalah yang sudah dikunci. Akhiri tiap kanvas:\n   \"=== AKHIR [Bab N] === | Untuk lanjut di KANVAS BARU, ketik: LANJUT Bab [N+1]\"\n================================================================\n\nPEMERIKSAAN PRA-KONDISI (WAJIB sebelum output)\n================================================================\n1. Modul 0-7 selesai? [Ya/Tidak]. Sumber data lanjutan, pilih SATU:\n     JALUR A -> Modul 8 (rencana Dataset)   : [Ya/Tidak]\n     JALUR B -> Modul 9 (rancangan Statistik): [Ya/Tidak]\n   Jika keduanya kosong: BERHENTI, minta pengguna jalankan Modul 8 atau 9.\n2. Baca TAHAP: ( ) TAHAP 1 Seminar Proposal (Bab 1-3) ( ) TAHAP 2 Seminar Hasil (Bab 1-5)\n3. Baca BIDANG ILMU (Seksi L): Saintek/Ilmu Komputer -> Metode JALUR MODEL;\n   Umum/Sosial-Humaniora -> Metode JALUR SOSHUM.\n4. Baca JENIS PENELITIAN: Kuantitatif / Kualitatif / Pengembangan (R&D).\n   Jenis ini menentukan Bab 3, bentuk hipotesis/proposisi (Bab 2), dan Bab 5.\n\n================================================================\nCATATAN KEJUJURAN (WAJIB ditampilkan)\n================================================================\nModul ini membantu menyusun draf proposal/laporan tesis S2 sesuai struktur lazim.\nStandar rinci (jumlah halaman, jumlah rujukan, format sampul, gaya) berbeda tiap\nkampus/prodi; bagian seperti itu ditandai \"[sesuaikan panduan kampus]\". Modul ini\nalat bantu, BUKAN jaminan lulus seminar. Pengungkapan AI (Seksi O.2) tetap wajib.\n\n================================================================\nBAB 1 — PENDAHULUAN  (Kanvas 1)\n================================================================\n1.1 Latar Belakang\n    [Fenomena, urgensi, kesenjangan (rujuk Modul 4); sitasi APA dari korpus\n     Modul 1. Tegaskan POSISI KEBARUAN awal (R2). Data/grafik: lampirkan sumber\n     valid; jika ragu tandai \"[sumber data perlu dilampirkan]\" — jangan mengarang.]\n1.2 Rumusan Masalah\n    [Daftar pertanyaan penelitian bernomor RM1, RM2, ... BENANG MERAH: tiap RM\n     wajib dijawab di Bab 4 dan disimpulkan di Bab 5.]\n1.3 Batasan Masalah\n1.4 Tujuan Penelitian   [selaras dengan tiap rumusan masalah]\n1.5 Manfaat Penelitian (R4)\n    A. Kontribusi Teoretis  [DITONJOLKAN: sumbangan pada pengembangan teori/bidang]\n    B. Kontribusi Praktis\n1.6 Sistematika Penulisan  [ringkas isi Bab I sampai Bab V]\n\n================================================================\nBAB 2 — KAJIAN PUSTAKA / LANDASAN TEORI  (Kanvas 2)\n================================================================\nSusun dengan heading dan 4 sub-heading terstruktur, sitasi gaya APA. Teori\nselaras dengan latar belakang, rumusan masalah, dan batasan masalah (Bab 1).\n\nATURAN SUMBER SITASI BAB 2 — TINGKAT S2 (WAJIB) (R5):\n- Komposisi: 80% sumber dari jurnal INTERNASIONAL bereputasi (Scopus Q2, Q3, Q4,\n  atau IEEE) dan 20% dari jurnal terindeks SINTA 1-2. Lebih menuntut rujukan\n  internasional dibanding S1.\n- Utamakan jurnal OPEN ACCESS. Kemutakhiran: mayoritas rujukan 5-10 tahun\n  terakhir; utamakan sumber PRIMER.\n- ATURAN ANTI-FABRIKASI (TIDAK DAPAT DILANGGAR):\n    * DOI dan tautan HANYA dari korpus Modul 1 dan lengkap (https://doi.org/[DOI]).\n    * Jika DOI/tautan tidak ada atau tidak yakin: tulis\n      \"[DOI perlu verifikasi di doi.org]\" dan \"[tautan akses perlu diverifikasi]\".\n    * JANGAN mengarang DOI, tautan, peringkat (Q2/Q3/Q4/SINTA), atau status open\n      access. Verifikasi akhir adalah tanggung jawab penulis.\n- Penanda jenis per entri, contoh: \"[Scopus Q2, open access]\" atau\n  \"[SINTA 1, perlu verifikasi]\".\n- Jika korpus belum memenuhi komposisi 80/20: JANGAN mengarang; tandai\n  \"[perlu tambahan sumber sesuai komposisi S2]\".\n\n2.0 Penelitian Terdahulu (R2)\n    [Tabel sintesis: | Penulis, Tahun | Metode | Temuan | Gap |. Akhiri dengan\n     penegasan posisi kebaruan tesis ini terhadap penelitian terdahulu.]\n\n2.1 [Heading Teori Utama]\n    [Uraian teori naratif penuh, sitasi APA.]\n    Literature Questions: 1-5. [Lima pertanyaan Bahasa Inggris - bagian naskah.]\n    2.1.1 [Sub-heading 1]  [uraian] Literature Questions: 1-5. [Inggris.]\n    2.1.2 [Sub-heading 2]  [uraian] Literature Questions: 1-5. [Inggris.]\n    2.1.3 [Sub-heading 3]  [uraian] Literature Questions: 1-5. [Inggris.]\n    2.1.4 [Sub-heading 4]  [uraian] Literature Questions: 1-5. [Inggris.]\n\n2.2 Kerangka Konseptual (R1)\n    [Sintesis teori menjadi model pemikiran sendiri; sajikan bagan hubungan\n     antar-variabel/konsep (ASCII; AI tujuan boleh render visual bila mendukung).]\n\n2.3 Hipotesis / Proposisi (R1)\n    JIKA Kuantitatif: rumuskan HIPOTESIS (H1, H2, ...) yang dapat diuji.\n    JIKA Kualitatif : rumuskan PROPOSISI penelitian.\n    JIKA R&D        : rumuskan kriteria kelayakan/efektivitas produk.\n    [Tautkan tiap hipotesis/proposisi ke rumusan masalah.]\n\n[Catatan: pertanyaan literatur di tiap heading/sub-heading adalah bagian naskah,\n sesuai pilihan pengguna. Konsistensi istilah mengikuti GLOSARIUM Modul 1.]\n\nKONSISTENSI SITASI (R8-warisan): SETIAP sumber yang disitasi di Bab 2 muncul di\nDaftar Pustaka, dan sebaliknya. Tidak ada sitasi tanpa entri atau entri tanpa\nsitasi.\n\nGERBANG KOMPOSISI SUMBER BAB 2 (periksa sebelum lanjut):\n- 80% internasional (Q2/Q3/Q4/IEEE) dan 20% SINTA 1-2? Jika belum: tandai untuk\n  dilengkapi, JANGAN mengarang sumber.\n- Mayoritas mutakhir (5-10 tahun) dan primer?\n- DOI/tautan/peringkat/status open access tidak ada yang fabrikasi?\n\n================================================================\nBAB 3 — METODOLOGI PENELITIAN  (Kanvas 3) — TINGKAT S2 (R3)\n================================================================\nSelaras dengan Bab 1 dan Bab 2 (kerangka konseptual, hipotesis/proposisi).\n\n3.1 Jenis dan Pendekatan Penelitian\n    [Sebutkan jenis; sertakan JUSTIFIKASI pemilihan metode (mengapa metode ini,\n     bukan alternatif lain) — tuntutan rigor S2.]\n3.2 Definisi Operasional Variabel/Konsep\n    [Definisikan tiap variabel/konsep secara operasional dan terukur.]\n3.3 Desain / Prosedur Penelitian\n    JALUR MODEL (Saintek/Ilmu Komputer): ALGORITMA FLOWCHART (ASCII); data dari\n       JALUR A (Modul 8) atau JALUR B (Modul 9). AI tujuan boleh render visual.\n    JALUR SOSHUM (Umum/Sosial-Humaniora): prosedur sesuai jenis penelitian.\n    JIKA Kuantitatif: populasi, sampel, teknik sampling; instrumen; uji validitas\n       dan reliabilitas; uji asumsi.\n    JIKA Kualitatif : informan; teknik pengumpulan; keabsahan data (triangulasi);\n       posisi peneliti.\n    JIKA R&D        : model pengembangan; tahap; subjek uji coba; instrumen\n       kelayakan.\n3.4 Alat dan Bahan Penelitian\n3.5 Teknik Analisis Data\n    [Sesuai jenis dan hipotesis/proposisi; untuk kuantitatif tautkan ke uji\n     hipotesis; dari rancangan Modul 9 bila dipilih.]\n\n[JIKA TAHAP 1 (Seminar Proposal): SELESAI sampai Bab 3. Bab 4-5 TIDAK dimunculkan.]\n\n================================================================\nBAB 4 — HASIL DAN PEMBAHASAN  (Kanvas 4 — hanya TAHAP 2)\n================================================================\nMenjawab Bab 1-3. ANTI-FABRIKASI: gunakan kerangka, jangan mengarang angka.\n4.1 [Hasil menjawab RM1]  [data: \"[isi dari hasil penelitian Anda]\"; tabel/gambar\n     diberi keterangan; uji hipotesis bila kuantitatif.]\n4.2 [Hasil menjawab RM2]  [pola sama; satu sub-bab per rumusan masalah.]\n4.3 Pembahasan\n    [Interpretasi dikaitkan kerangka konseptual (Bab 2), hipotesis/proposisi, dan\n     metode (Bab 3); bandingkan dengan penelitian terdahulu (2.0).]\n\n================================================================\nBAB 5 — PENUTUP  (Kanvas 5 — hanya TAHAP 2)\n================================================================\n5.1 Kesimpulan\n    [Jawaban ringkas atas TIAP rumusan masalah. Kuantitatif -> sertakan data\n     angka hasil; jika belum ada tandai \"[isi dari hasil penelitian Anda]\".\n     Kualitatif -> temuan tematik. Nyatakan status hipotesis/proposisi.]\n5.2 Saran\n    [Saran teoretis (kontribusi pada teori), praktis, dan untuk penelitian lanjut.]\n\n================================================================\nDAFTAR PUSTAKA (Gaya APA)\n================================================================\nHanya pustaka yang disitasi. Gaya APA. Patuhi komposisi sumber Bab 2 (80/20),\nkemutakhiran, dan ANTI-FABRIKASI DOI/tautan/peringkat. Sumber dari korpus\nModul 0/1; jika ragu \"[DOI perlu verifikasi di doi.org]\".\n\n================================================================\nGERBANG KELENGKAPAN PER TAHAP — alat bantu, BUKAN jaminan lulus seminar\n================================================================\nTAHAP 1 (Seminar Proposal):\n   T1-1: Bab 1 lengkap; manfaat memisahkan kontribusi teoretis dan praktis (R4)?\n   T1-2: Bab 2 punya penelitian terdahulu (R2), heading + 4 sub-heading dengan\n         5 pertanyaan (Inggris), kerangka konseptual + hipotesis/proposisi (R1)?\n   T1-3: Bab 3 tingkat S2: justifikasi metode + definisi operasional (R3)?\n   T1-4: Komposisi sumber Bab 2 = 80% internasional + 20% SINTA 1-2, mutakhir,\n         tanpa fabrikasi DOI/peringkat (R5)?\n   T1-5: Konsistensi sitasi Bab 2 <-> Daftar Pustaka?\nTAHAP 2 (Seminar Hasil):\n   T2-1: Semua gerbang Tahap 1 terpenuhi?\n   T2-2: Bab 4 menjawab TIAP rumusan masalah; uji hipotesis bila kuantitatif?\n   T2-3: Bab 5 menyimpulkan tiap RM, menyatakan status hipotesis/proposisi?\n   T2-4: Tidak ada angka fabrikasi; data kosong ditandai jelas?\nGERBANG UMUM:\n   G-A: Tiap bab pada KANVAS BARU terpisah; pembagian sesuai tahap?\n   G-B: Glosarium dan istilah konsisten lintas-bab?\n   G-C: PUBEI dan Gaya Natural (Seksi P); tanda baca sesuai himpunan?\n   G-D: Pembeda S2 ditegakkan (kerangka konseptual, hipotesis, novelty, kontribusi\n        teoretis, mutu rujukan) — tidak terbaca seperti skripsi S1?\nJika ada gerbang gagal: perbaiki sebelum lanjut; catat\n\"KOREKSI OTOMATIS DITERAPKAN: [deskripsi]\".\n\n================================================================\nATURAN ANTI-HALUSINASI (WAJIB)\n================================================================\n1. Sitasi [Pengarang, Tahun] merujuk korpus Modul 1; daftar pustaka APA.\n2. Angka hasil (Bab 4-5) tidak dikarang; tandai \"[isi dari hasil penelitian Anda]\".\n3. DOI/tautan/peringkat/status open access tidak dikarang; ditandai verifikasi.\n4. Standar khas kampus ditandai \"[sesuaikan panduan kampus]\".\n5. Modul ini alat bantu, BUKAN jaminan lulus seminar.\n6. Pengungkapan AI (Seksi O.2) tetap wajib.\n"};

/* ---------- Eligibilitas modul statistik (Seksi L) ---------- */
function statEligible(){ return CTX.bidang !== "Ilmu Komputer"; }

/* ---------- Pembangun prompt ---------- */
function effectiveTarget(){
  if(CTX.level==="Hibah BIMA") return "BIMA " + CTX.bima;
  if(CTX.level==="BRIN") return "BRIN";
  return CTX.target;
}
function buildContextInjection(){
  return 'CONTEXT INJECTION (Core Layer v8.8 - Seksi L):\n'
    + 'Bidang Penelitian : '+CTX.bidang+'\n'
    + 'Level Akademik    : '+CTX.level+'\n'
    + 'Target/Skema      : '+effectiveTarget()+'\n'
    + 'Eligibilitas Modul 9 (Statistik): '+(statEligible()?'YA':'TIDAK (Ilmu Komputer - gunakan benchmark ML)')+'\n'
    + 'Sesi              : '+SESSION_CODE+'\n'
    + 'Terapkan parameter ini ke SELURUH output modul.\n\n';
}
function withCore(body){
  var core = PROMPTS['core'] || '';
  var head = buildContextInjection() + core + '\n\n' + (PROMPTS['opener']||'').replace(/\[KODE\]/g,SESSION_CODE) + '\n\n';
  var out = head + body;
  if(sidEnabled){ out = sidToken() + '\n' + out; }
  return out;
}

/* ---------- Clipboard ---------- */
function copyText(text, btn){
  function done(){ if(btn){ var o=btn.innerHTML; btn.classList.add('ok'); btn.innerHTML='&#10003; Tersalin'; setTimeout(function(){btn.classList.remove('ok');btn.innerHTML=o;},1600);} }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(function(){fallback(text);done();});
  } else { fallback(text); done(); }
}
function fallback(text){ var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta); }

/* ---------- Sidebar ---------- */
function buildSidebar(){
  var side=document.getElementById('side'); var html='';
  html += navItem('home','&#127968;','Beranda','Dashboard & panduan');
  var lastGroup='';
  MODS.forEach(function(m){
    var id=m[0],label=m[1],sub=m[2],group=m[3];
    if(group && group!==lastGroup){ html+='<div class="ns">'+group+'</div>'; lastGroup=group; }
    var badge = id==='core' ? 'CL' : id.toUpperCase();
    html += navItem(id,'<span style="font-family:var(--mono);font-size:12px">'+badge+'</span>',label,sub);
  });
  side.innerHTML=html;
}
function navItem(id,badge,label,sub){
  var st=STATUS[id]||'';
  var stCls = st==='done'?'done':(st==='active'?'active':'');
  var dot = id==='home'?'':'<span class="nst '+stCls+'" id="st-'+id+'"></span>';
  return '<div class="ni" id="nav-'+id+'" onclick="show(\''+id+'\')">'
    + '<div class="nb" id="nb-'+id+'">'+badge+'</div>'
    + '<div class="ni-info"><div class="nl">'+label+'</div><div class="nsub">'+sub+'</div></div>'
    + dot + '</div>';
}

/* ---------- Router ---------- */
var current='home';
function show(id){
  current=id;
  document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('active');});
  var nav=document.getElementById('nav-'+id); if(nav)nav.classList.add('active');
  if(id!=='home' && STATUS[id]==='todo'){ STATUS[id]='active'; saveStatus(); }
  var main=document.getElementById('main');
  if(id==='home') main.innerHTML=renderHome();
  else if(id==='core') main.innerHTML=renderCore();
  else main.innerHTML=renderModule(id);
  window.scrollTo(0,0);
  refreshProgress(); refreshDots(); closeSide();
}

      + '<select id="inp-jenis"><option value="Kuantitatif">Kuantitatif</option>'
      + '<option value="Kualitatif">Kualitatif</option>'
      + '<option value="Pengembangan (R&D)">Pengembangan (R&D)</option></select>'
      + '<p style="font-size:12.5px;color:var(--ink3);margin-top:6px">Menentukan isi Bab 3 dan bentuk Bab 5 (angka untuk kuantitatif, tematik untuk kualitatif).</p></div>';
    var jalur13 = (CTX.bidang==='Sains dan Teknologi'||CTX.bidang==='Ilmu Komputer') ? 'JALUR MODEL (flowchart algoritma)' : 'JALUR SOSHUM (prosedur sesuai jenis)';
    html += '<div class="note">Bidang <strong>'+CTX.bidang+'</strong> -> Metode '+jalur13+'. Bab 2 (Kajian Pustaka) memakai heading + 4 sub-heading, masing-masing ditutup 5 pertanyaan literatur (Inggris) sebagai bagian naskah, sitasi APA. Rumusan masalah jadi benang merah yang dijawab di Bab 4 dan disimpulkan di Bab 5. Tiap bab ditulis di kanvas baru terpisah. Bagian khas kampus ditandai untuk disesuaikan.</div>';
  }
  if(id==='m14'){
    html += '<div class="field"><label>Bidang Ilmu</label>'
      + '<select onchange="setCtx(\'bidang\',this.value)">'
      + (CFG.FIELDS||[]).map(function(v){return '<option value="'+v+'"'+(CTX.bidang===v?' selected':'')+'>'+v+'</option>';}).join('')
      + '</select>'
      + '<p style="font-size:12.5px;color:var(--ink3);margin-top:6px">Menentukan percabangan Metode Bab 3: Saintek/Ilmu Komputer -> JALUR MODEL (flowchart); Umum/Sosial-Humaniora -> JALUR SOSHUM.</p></div>';
    html += '<div class="field"><label>Sumber Data Lanjutan</label>'
      + '<select id="inp-source"><option value="Modul 8 (rencana Dataset)">Lanjut dari Modul 8 (rencana Dataset)</option>'
      + '<option value="Modul 9 (rancangan Statistik)">Lanjut dari Modul 9 (rancangan Statistik)</option></select></div>';
    html += '<div class="field"><label>Tahap Tesis</label>'
      + '<select id="inp-stage"><option value="Tahap 1 - Seminar Proposal (Bab 1-3)">Tahap 1 - Seminar Proposal (Bab 1-3)</option>'
      + '<option value="Tahap 2 - Seminar Hasil (Bab 1-5)">Tahap 2 - Seminar Hasil (Bab 1-5)</option></select>'
      + '<p style="font-size:12.5px;color:var(--ink3);margin-top:6px">Tahap 1 menghasilkan Bab 1-3 (3 kanvas). Tahap 2 menghasilkan Bab 1-5 (5 kanvas).</p></div>';
    html += '<div class="field"><label>Jenis Penelitian</label>'
      + '<select id="inp-jenis"><option value="Kuantitatif">Kuantitatif</option>'
      + '<option value="Kualitatif">Kualitatif</option>'
      + '<option value="Pengembangan (R&D)">Pengembangan (R&D)</option></select>'
      + '<p style="font-size:12.5px;color:var(--ink3);margin-top:6px">Menentukan Bab 3, bentuk hipotesis/proposisi (Bab 2), dan Bab 5.</p></div>';
    var jalur14 = (CTX.bidang==='Sains dan Teknologi'||CTX.bidang==='Ilmu Komputer') ? 'JALUR MODEL (flowchart algoritma)' : 'JALUR SOSHUM (prosedur sesuai jenis)';
    html += '<div class="note"><strong>Tesis S2</strong> (berbeda dari skripsi S1). Bidang <strong>'+CTX.bidang+'</strong> -> Metode '+jalur14+'. Bab 2 wajib menghasilkan kerangka konseptual + hipotesis/proposisi, dengan sumber 80% internasional (Q2/Q3/Q4/IEEE) + 20% SINTA 1-2, utamakan open access dan mutakhir. Manfaat menonjolkan kontribusi teoretis. DOI/peringkat dari korpus, ditandai verifikasi bila ragu (tidak dikarang). Tiap bab di kanvas baru terpisah.</div>';
  }
  if(needsTechnique) html += '<div class="field"><label>Teknik Analisis</label><select id="inp-tech"><option>Regresi Linear Multivariat</option><option>Analisis Moderasi</option><option>Analisis Mediasi</option><option>Path Analysis / SEM</option></select></div>';
  if(needsScheme){
    var src = (id==='m8'||id==='m10') ? M8 : SCHEMES;   // Dataset & IMRAD use M8 scheme list (Q1/SINTA2)
    html += '<div class="field"><label>Skema Target</label><div class="scheme-grid">';
    src.forEach(function(s){
      html += '<div class="scheme" id="sch-'+s.id+'" style="border-color:'+s.bd+'" onclick="selScheme(\''+s.id+'\')"><div class="sn" style="color:'+s.color+'">'+s.label+'</div><div class="sd">'+s.desc+'</div></div>';
    });
    html += '</div></div>';
  }

  html += '<div style="margin-top:8px">'
    + '<button class="cpbtn" id="cp-'+id+'" onclick="copyModule(\''+id+'\')">&#128203; Salin Prompt (+ Core Layer)</button>'
    + '<button class="rbtn" style="margin-left:10px" onclick="markDone(\''+id+'\')">&#10003; Tandai selesai</button>'
    + '</div>'
    + '<p class="statusmsg">Core Layer tersembunyi tetap ikut saat disalin.</p>'
    + '</div>' + footer();
  return html;
}

var selectedScheme=null;
function selScheme(sid){
  selectedScheme=sid;
  document.querySelectorAll('.scheme').forEach(function(s){s.classList.remove('sel');});
  var el=document.getElementById('sch-'+sid); if(el)el.classList.add('sel');
}

function copyModule(id){
  var body = PROMPTS[id]||'';
  var kw=document.getElementById('inp-kw'), tp=document.getElementById('inp-topic'), tech=document.getElementById('inp-tech');
  if(kw) body=body.replace(/\[KEYWORD_INPUT\]/g, kw.value||'[KEYWORD_INPUT]');
  if(tp) body=body.replace(/\[TOPIC_INPUT\]/g, tp.value||'[TOPIC_INPUT]');
  if(tech) body=body.replace(/\[TECHNIQUE_INPUT\]/g, tech.value||'[TECHNIQUE_INPUT]');
  var srcSel=document.getElementById('inp-source');
  if(srcSel){ body = 'SUMBER DATA LANJUTAN DIPILIH PENGGUNA: '+srcSel.value+'\n\n'+body; }
  if(selectedScheme){
    var all = (id==='m11') ? BIMA_SCHEMES : ((id==='m8'||id==='m10')?M8:SCHEMES);
    var s=all.filter(function(x){return x.id===selectedScheme;})[0];
    if(s) body=body.replace(/\[SCHEME_INPUT\]/g, s.label);
  } else {
    body=body.replace(/\[SCHEME_INPUT\]/g, effectiveTarget());
  }
  if(id==='m11'){
    var periodSel=document.getElementById('inp-period');
    var period = (selectedScheme==='pdp') ? '1 tahun' : (periodSel? periodSel.value : M11_PERIOD);
    var novelty = (period.indexOf('multiyear')>=0) ? 2 : 1;
    body = 'MASA PENELITIAN DIPILIH PENGGUNA: '+period+' (JUMLAH NOVELTY: '+novelty+')\n'
         + 'BIDANG: '+CTX.bidang+' -> '+((CTX.bidang==='Sains dan Teknologi'||CTX.bidang==='Ilmu Komputer')?'JALUR MODEL':'JALUR SOSHUM')+'\n\n'
         + body;
  }
  if(id==='m12'){
    var periodSel2=document.getElementById('inp-period');
    var period2 = periodSel2? periodSel2.value : '1 tahun';
    var novelty2 = (period2.indexOf('multiyear')>=0) ? 2 : 1;
    var srcSel2=document.getElementById('inp-source');
    var themeSel=document.getElementById('inp-theme');
    var pre = 'SUMBER DATA LANJUTAN DIPILIH PENGGUNA: '+(srcSel2?srcSel2.value:'Modul 8')+'\n'
            + 'MASA PENELITIAN (maks 3 tahun): '+period2+' (JUMLAH NOVELTY: '+novelty2+')\n'
            + 'BIDANG: '+CTX.bidang+' -> '+((CTX.bidang==='Sains dan Teknologi'||CTX.bidang==='Ilmu Komputer')?'JALUR MODEL':'JALUR SOSHUM')+'\n'
            + 'TEMA FOKUS BRIN DIPILIH PENGGUNA: '+((themeSel&&themeSel.value)?themeSel.value:'[pilih tema fokus]')+'\n\n';
    body = pre + body;
  }
  if(id==='m13'){
    var srcSel3=document.getElementById('inp-source');
    var stageSel=document.getElementById('inp-stage');
    var jenisSel=document.getElementById('inp-jenis');
    var pre3 = 'SUMBER DATA LANJUTAN DIPILIH PENGGUNA: '+(srcSel3?srcSel3.value:'Modul 8')+'\n'
             + 'TAHAP DIPILIH PENGGUNA: '+(stageSel?stageSel.value:'Tahap 1')+'\n'
             + 'JENIS PENELITIAN DIPILIH PENGGUNA: '+(jenisSel?jenisSel.value:'Kuantitatif')+'\n'
             + 'BIDANG: '+CTX.bidang+' -> '+((CTX.bidang==='Sains dan Teknologi'||CTX.bidang==='Ilmu Komputer')?'JALUR MODEL':'JALUR SOSHUM')+'\n\n';
    body = pre3 + body;
  }
  copyText(withCore(body), document.getElementById('cp-'+id));
  if(STATUS[id]!=='done'){ STATUS[id]='active'; saveStatus(); refreshDots(); refreshProgress(); }
}
function markDone(id){ STATUS[id]='done'; saveStatus(); refreshDots(); refreshProgress(); }

/* ---------- Progress ---------- */
function refreshProgress(){
  var d=0,a=0,t=0;
  MODS.forEach(function(m){ var s=STATUS[m[0]]; if(s==='done')d++; else if(s==='active')a++; else t++; });
  document.getElementById('cd').textContent=d; document.getElementById('ca').textContent=a; document.getElementById('ct').textContent=t;
}
function refreshDots(){
  MODS.forEach(function(m){ var el=document.getElementById('st-'+m[0]); if(!el)return;
    el.className='nst'+(STATUS[m[0]]==='done'?' done':STATUS[m[0]]==='active'?' active':''); });
}
function resetAll(){ MODS.forEach(function(m){STATUS[m[0]]='todo';}); saveStatus(); refreshDots(); refreshProgress(); show('home'); }

/* ---------- Sidebar mobile ---------- */
function openSide(){document.getElementById('side').classList.add('open');document.getElementById('ov').classList.add('show');}
function closeSide(){document.getElementById('side').classList.remove('open');document.getElementById('ov').classList.remove('show');}
document.getElementById('hb').addEventListener('click',function(){ var s=document.getElementById('side'); if(s.classList.contains('open'))closeSide();else openSide(); });

function footer(){
  return '<footer class="foot">'
    + 'ALAS v8.8 &middot; Asisten Riset Akademik<br>'
    + '16 Seksi (A-P) &middot; 16 Modul &middot; PUBEI &middot; Mesin Konteks &middot; Gaya Natural<br>'
    + '&copy; 2024-2026 Alhumaira Store &middot; Core Layer tersembunyi, integritas tetap dijaga.'
    + '</footer>';
}

/* ---------- Init ---------- */
buildSidebar(); updateBadge(); show('home');
</script>
