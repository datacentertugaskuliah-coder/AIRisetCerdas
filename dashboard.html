yebab + resolubilitas\n   - Dari Modul 3 : 3 konsep teratas + status (Settled/Contested/Still evolving)\n   - Dari Modul 4 : 5 kesenjangan prioritas (Tipe 1/2/3) + skor peringkat\n   - Dari Modul 5 : Metodologi dominan, metodologi absen, makalah terlemah,\n                    rekomendasi perbaikan metodologi (2–3 item)\n\n5. Verifikasi topik memiliki MINIMAL 3 variabel yang dapat dioperasionalkan:\n   - 1 Variabel Dependen (Y)\n   - 1 Variabel Independen (X)\n   - 1+ Variabel tambahan: Moderator (Z), Mediator (M), atau Kontrol\n\n================================================================\nTUGAS UTAMA\n================================================================\n\nHasilkan 10 REKOMENDASI JUDUL PENELITIAN BERIMPAK TINGGI pada topik:\n[TOPIC_INPUT]\n\nSetiap rekomendasi WAJIB:\n  - Menggunakan 4 teknik analisis statistik multivariat sebagai metodologi inti:\n    *Regresi Linear Multivariat*, *Analisis Moderasi*, *Analisis Mediasi*\n    (*Intervening*), atau *Path Analysis* / *Structural Equation Modeling*\n  - Menggunakan hasil sintesis Modul 5 (audit metodologi) sebagai input utama\n  - Mengintegrasikan kesenjangan Modul 4 sebagai target ilmiah\n  - Menggunakan kontradiksi Modul 2 sebagai sumber ketegangan penelitian\n  - Berbobot ≈2500 kata (paragraf penuh, tanpa poin-poin di badan teks)\n  - Mencakup 6 seksi: Latar Belakang, Urgensi, Sitasi Peneliti Terdahulu,\n                       2 *Novelty*, *Flowchart* ASCII, Kesenjangan\n  - Berimpak tinggi: relevan untuk publikasi Scopus Q1 ATAU SINTA 2\n  - Berbasis bukti korpus, bukan halusinasi\n\n================================================================\nSTRATEGI DISTRIBUSI 10 JUDUL — KOMPREHENSIF & RELEVAN\n================================================================\n\nDistribusikan 10 judul untuk memberikan portofolio penelitian KOMPREHENSIF\ndan SALING MELENGKAPI (bukan pengulangan dari satu gagasan):\n\n  Slot 1–3 : JUDUL PERLUASAN (*Extension*)\n    - Memperluas temuan makalah terkuat Modul 5 ke konteks baru\n    - Mengisi kesenjangan Tipe 1 (Diakui) Modul 4\n    - Teknik utama: *Regresi Linear Multivariat* atau *Path Analysis* dasar\n    - Risiko: RENDAH | Keterlaksanaan: TINGGI | Dampak: SEDANG\n    - Cocok: BIMA PDP, SINTA 2, Scopus Q3–Q4\n\n  Slot 4–6 : JUDUL RESOLUSI KONTRADIKSI (*Contradiction Resolution*)\n    - Menyelesaikan 1–3 kontradiksi paling dapat diselesaikan dari Modul 2\n    - Menggunakan *Analisis Moderasi* untuk mengurai kondisi batas\n    - Risiko: SEDANG | Keterlaksanaan: SEDANG | Dampak: TINGGI\n    - Cocok: BIMA PFR, Scopus Q1–Q2\n\n  Slot 7–8 : JUDUL INOVASI METODOLOGIS (*Methodological Innovation*)\n    - Mengisi metodologi ABSEN yang teridentifikasi di Modul 5\n    - Teknik utama: *Analisis Mediasi* + *SEM* penuh secara terpadu\n    - Risiko: SEDANG–TINGGI | Keterlaksanaan: SEDANG | Dampak: TINGGI\n    - Cocok: BIMA Terapan, Scopus Q1, BRIN\n\n  Slot 9   : JUDUL JEMBATAN ANTARDISIPLIN (*Interdisciplinary Bridge*)\n    - Mengisi kesenjangan Tipe 3 (Absen) Modul 4\n    - Mengintegrasikan konstruk dari 2+ kluster Modul 1\n    - Teknik utama: *Full SEM* dengan *latent variable* multidimensi\n    - Risiko: TINGGI | Keterlaksanaan: SEDANG | Dampak: SANGAT TINGGI\n    - Cocok: BRIN strategis, Scopus Q1 berimpak tinggi\n\n  Slot 10  : JUDUL KONTEKS NASIONAL (*National Context*)\n    - Memvalidasi atau mengadaptasi temuan korpus pada konteks Indonesia\n    - Menggunakan dataset nasional (BPS, data.go.id, Kemkes, BRIN)\n    - Teknik utama: *PLS-SEM* (SmartPLS) — cocok untuk sampel kecil Indonesia\n    - Risiko: RENDAH–SEDANG | Keterlaksanaan: TINGGI | Dampak: SEDANG–TINGGI\n    - Cocok: SINTA 2, BIMA Terapan, Hibah Internal PT\n\nPRINSIP DIVERSITAS WAJIB:\n  - Maksimal 2 judul boleh memakai teknik analisis yang sama\n  - Setiap judul harus mengalamatkan kesenjangan atau kontradiksi BERBEDA\n  - Minimal 3 judul HARUS bertarget Scopus Q1 (berimpak tinggi internasional)\n  - Minimal 2 judul HARUS bertarget SINTA 2 (bereputasi nasional)\n  - Distribusikan dimensi *novelty*: metodologis, teoritis, empiris, terapan,\n    kontekstual, antardisiplin — usahakan minimal 4 dimensi berbeda\n\n================================================================\nFORMAT OUTPUT — PER REKOMENDASI (≈2500 KATA)\n================================================================\n\nUntuk SETIAP dari 10 rekomendasi, gunakan struktur berikut PERSIS:\n\n==============================================================\nREKOMENDASI [N] DARI 10\nTipe Slot       : [Perluasan / Resolusi Kontradiksi / Inovasi Metodologis /\n                   Jembatan Antardisiplin / Konteks Nasional]\nTarget Reputasi : [Scopus Q1 / Scopus Q2 / Scopus Q3–Q4 / SINTA 2 /\n                   Multi-target]\nTeknik Utama    : [*Regresi Linear Multivariat* / *Analisis Moderasi* /\n                   *Analisis Mediasi* / *Path Analysis* / *Full SEM*]\nDampak Estimasi : [Tinggi Internasional / Tinggi Nasional /\n                   Sedang Internasional / Sedang Nasional]\n==============================================================\n\n## JUDUL PENELITIAN — [Spesifik, Terukur, Tidak Generik]\n[Format judul harus mengandung:\n (a) variabel/objek utama,\n (b) teknik analisis (*miring* sesuai PUBEI),\n (c) konteks atau populasi.\n Contoh BURUK: \"Studi tentang kinerja karyawan\"\n Contoh BAIK : \"Pengaruh *Work-Life Balance* terhadap Kinerja Karyawan\n                Melalui Kepuasan Kerja sebagai Pemediasi (*Mediating Variable*):\n                *Structural Equation Modeling* pada Perusahaan Manufaktur\n                di Jawa Barat\"]\n\n---\n\n### 1. Latar Belakang (≈500 kata)\n\n[Paragraf naratif penuh, TANPA poin-poin. Bahas berurutan:\n\n (a) KONTEKS GLOBAL (≈120 kata):\n     Fenomena/permasalahan global, statistik atau tren terkini yang relevan,\n     dampaknya pada bidang ilmu. Cantumkan minimal 2 sitasi dari korpus\n     Modul 1 [Pengarang, Tahun][tingkat bukti].\n     Istilah asing tidak diserap → *miring*.\n\n (b) KONTEKS NASIONAL/LOKAL (≈100 kata):\n     Bagaimana fenomena tersebut termanifestasi di Indonesia.\n     Sertakan data BPS, Kemkes, BRIN, atau lembaga otoritatif jika tersedia\n     dari korpus — jika tidak, tandai [Perlu verifikasi — data nasional].\n\n (c) LANSKAP MASALAH (≈130 kata):\n     Apa yang sudah diketahui (*state of the art* dari korpus), apa yang masih\n     kontroversial (rujuk kontradiksi Modul 2), apa yang belum diketahui\n     (rujuk kesenjangan Modul 4). Tulis sebagai narasi yang mengalir.\n\n (d) JUSTIFIKASI INTELEKTUAL (≈100 kata):\n     Mengapa MENJAWAB pertanyaan ini akan menggerakkan bidang ke depan?\n     Apa kontribusi teoritis atau praktisnya?\n\n (e) PERNYATAAN MASALAH EKSPLISIT (≈50 kata):\n     \"Penelitian ini akan menjawab pertanyaan: ...\"\n     Harus operasional, bukan samar.\n\n ATURAN:\n  - Minimum 3 sitasi [Pengarang, Tahun] dari korpus Modul 1\n  - Setiap sitasi sertakan tingkat bukti [L1–L5] atau [L-QN/L-MX/dll]\n  - Istilah asing tidak diserap → cetak *miring*\n  - Hindari klaim berlebihan (\"revolusioner\", \"terobosan\" tanpa bukti)\n]\n\n---\n\n### 2. Urgensi Penelitian (≈400 kata)\n\n[Paragraf naratif penuh. Jawab: MENGAPA SEKARANG, BUKAN NANTI?\n\n (a) JENDELA PELUANG (≈100 kata):\n     Faktor temporal yang membuat saat ini waktu optimal:\n     - Kebijakan baru (UU, Permendiktisaintek, regulasi BRIN)\n     - Ketersediaan dataset besar yang baru (kandidat Modul 8)\n     - *Funding pipeline* yang sedang terbuka (siklus BIMA, prioritas BRIN)\n\n (b) BIAYA KETERLAMBATAN (≈100 kata):\n     Apa yang HILANG jika penelitian ini ditunda 3–5 tahun?\n     Pemangku kepentingan mana yang dirugikan?\n\n (c) KETIDAKPASTIAN ILMIAH AKTIF (≈100 kata):\n     Rujuk SECARA EKSPLISIT kontradiksi dari Modul 2:\n     \"Modul 2 mengidentifikasi kontradiksi antara [Pengarang A, Tahun] dan\n      [Pengarang B, Tahun] mengenai [topik]. Kontradiksi ini bersifat\n      [*Resolvable*/*Partially resolvable*/*Structural*] menurut audit Modul 2.\n      Tanpa penelitian seperti yang diusulkan, perdebatan ini akan berlanjut.\"\n      [Analisis]\n\n (d) MOMENTUM KEILMUAN (≈100 kata):\n     Tren publikasi pada topik ini (rujuk Modul 1 — distribusi tahun makalah).\n     Apakah bidang sedang *accelerating*, *plateau*, atau *decline*?\n\n ATURAN:\n  - Setiap klaim urgensi WAJIB dirujuk ke korpus Modul 1, kesenjangan Modul 4,\n    atau kontradiksi Modul 2\n  - Tandai [Analisis] untuk inferensi AI; [Pengarang, Tahun] untuk klaim makalah\n]\n\n---\n\n### 3. Sitasi Peneliti Terdahulu & Pemosisian (≈550 kata)\n\n[Paragraf naratif penuh. Bahas MINIMUM 5 peneliti dari korpus Modul 1,\n disusun sebagai BENANG INTELEKTUAL NARATIF, bukan daftar.\n\n (a) PELOPOR (≈120 kata):\n     Peneliti pertama dalam korpus yang membuka jalan untuk topik ini.\n     Rujuk Modul 3 jika konsep memiliki originator.\n     Format: \"[Pengarang, Tahun][L-level] memperkenalkan [konsep X]\n      dengan menemukan bahwa [temuan inti]. Metodologi mereka adalah\n      [metodologi dari Modul 5]. Kontribusi ini menjadi landasan karena\n      [alasan spesifik].\"\n\n (b) PENGEMBANG (≈130 kata):\n     2 peneliti yang mengembangkan gagasan pelopor.\n     Format: \"Di atas fondasi tersebut, [Pengarang, Tahun][L-level]\n      memperluas pendekatan ke [aspek baru], menemukan [hasil].\n      Sementara itu, [Pengarang, Tahun][L-level] mengambil arah paralel\n      dengan [pendekatan berbeda], menghasilkan [temuan].\"\n\n (c) PENGUJI/PENGKRITIK (≈120 kata):\n     1–2 peneliti yang menantang asumsi atau menemukan keterbatasan.\n     Rujuk Modul 2 jika relevan.\n     Format: \"Namun, [Pengarang, Tahun][L-level] mempertanyakan bahwa\n      [keterbatasan]. Temuan ini menciptakan kontradiksi yang Modul 2\n      klasifikasikan sebagai [akar penyebab: RC-M/RC-D/RC-T/RC-F].\"\n\n (d) PENELITI TERKINI (≈100 kata):\n     1 peneliti makalah terbaru dalam korpus yang merepresentasikan\n     kondisi terkini (*state of the art*).\n     Format: \"Penelitian terkini oleh [Pengarang, Tahun][L-level]\n      mencapai [hasil]. Namun Modul 5 mengidentifikasi bahwa metodologi\n      mereka memiliki keterbatasan pada kriteria [A/B/C/D].\"\n\n (e) PEMOSISIAN PENELITIAN INI (≈80 kata):\n     Tegaskan posisi: penelitian ini [MEMPERLUAS / MENANTANG /\n     MEREPLIKASI-DALAM-KONTEKS-BARU / MENSINTESISKAN] hasil di atas.\n     Jelaskan tepat bagaimana — bukan pernyataan generik.\n\n ATURAN:\n  - Minimum 5 peneliti DARI KORPUS Modul 1 — tidak boleh fabrikasi\n  - Setiap peneliti diberi label tingkat bukti dari Modul 1\n]\n\n---\n\n### 4. Kebaruan Penelitian (2 *Novelty* Substansial, ≈500 kata total)\n\n#### *Novelty* 1 — Dimensi: [Metodologis / Teoritis / Empiris / Terapan] (≈250 kata)\n\n[Paragraf penuh. Buka dengan:\n \"*Novelty* pertama dari penelitian ini adalah ...\"\n\n Kemudian bahas:\n\n (a) APA YANG BELUM DILAKUKAN (≈60 kata):\n     \"Sampai sejauh ini, tidak ada peneliti dalam korpus yang\n      [tindakan spesifik]. [Pengarang X, Tahun] mendekati ini dengan\n      [pendekatan], tetapi terhenti pada [batas spesifik].\"\n\n (b) APA YANG DILAKUKAN PENELITIAN INI (≈80 kata):\n     Spesifik dan operasional. Contoh: \"Menerapkan *Structural Equation\n     Modeling* dengan estimasi *Partial Least Squares* (SmartPLS 4) pada\n     [dataset spesifik] untuk pertama kalinya di bidang [bidang] —\n     mengintegrasikan konstruk [X], [Y], [Z] dalam satu model jalur.\"\n\n (c) KAITAN DENGAN MODUL 5 (≈60 kata):\n     \"Modul 5 mengidentifikasi bahwa metodologi [tipe metodologi] ABSEN\n      dalam korpus. Penelitian ini mengisi kekosongan tersebut dengan\n      [pendekatan spesifik].\" ATAU\n     \"Modul 5 menemukan makalah terlemah pada kriteria [A/B/C/D].\n      Penelitian ini menggunakan [perbaikan spesifik] untuk mengatasinya.\"\n\n (d) KEKUATAN ILMIAH (≈50 kata):\n     Mengapa pendekatan ini lebih kuat dari yang ada? Cantumkan pembanding\n     kuantitatif jika tersedia dari Modul 5.\n\n ATURAN:\n  - Harus DAPAT DIVERIFIKASI KEBARUANNYA dalam konteks korpus\n  - Tandai [Analisis] untuk inferensi; [Pengarang, Tahun] untuk pembanding\n  - Istilah teknis statistik yang tidak diserap → cetak *miring*\n]\n\n#### *Novelty* 2 — Dimensi: [BERBEDA dari *Novelty* 1] (≈250 kata)\n\n[Paragraf penuh. Buka dengan:\n \"*Novelty* kedua dari penelitian ini adalah ...\"\n\n PRINSIP: *Novelty* 2 HARUS dimensi BERBEDA dari *Novelty* 1.\n Jika *Novelty* 1 metodologis → *Novelty* 2 boleh teoritis/kontekstual/terapan.\n Jika *Novelty* 1 empiris → *Novelty* 2 boleh metodologis/teoritis.\n\n CONTOH KOMBINASI YANG BAIK UNTUK TEKNIK STATISTIK:\n  - *Novelty* 1: integrasi *moderating variable* yang belum pernah diuji\n    bersama konstruk X dan Y dalam satu model\n  - *Novelty* 2: konteks Indonesia sebagai uji validasi silang (*cross-validation*)\n    pertama di luar konteks Barat\n\n  - *Novelty* 1: *bootstrapping* 5000 sampel untuk *mediation* (bukan *Sobel test*)\n  - *Novelty* 2: penggunaan data longitudinal 3 titik waktu — mengatasi kelemahan\n    *cross-sectional* yang dominan dalam korpus (Modul 5)\n\n STRUKTUR: sama dengan *Novelty* 1 (a–d)\n]\n\n---\n\n### 5. Desain Penelitian dan *Flowchart* ASCII (≈450 kata)\n\n[Paragraf naratif (≈300 kata) yang mendeskripsikan:\n\n (a) JENIS PENELITIAN: kuantitatif / metode campuran (*mixed methods*)\n     — pilih SATU yang konsisten dengan audit Modul 5.\n (b) SUMBER DATA: nama dataset spesifik, populasi, sampel, kriteria\n     inklusi–eksklusi.\n (c) INSTRUMEN: skala/kuesioner tervalidasi (mis. skala Likert 5 poin,\n     *validated instrument* dari [Pengarang, Tahun]).\n (d) PROSEDUR ANALISIS: langkah teknik statistik multivariat yang dipilih.\n     Sebutkan teknik secara eksplisit: apakah *Regresi Linear Multivariat*,\n     *Analisis Moderasi* (SPSS + PROCESS Macro Model [N]),\n     *Analisis Mediasi* (PROCESS Model 4, *bootstrap* 5000),\n     atau *Path Analysis*/*SEM* (AMOS *CB-SEM* / SmartPLS *PLS-SEM*).\n (e) VALIDASI: uji asumsi, *goodness-of-fit indices* (*χ²/df*, CFI, RMSEA),\n     atau *Composite Reliability* + *AVE* (untuk *PLS-SEM*).\n (f) OUTPUT: artikel, model tervalidasi, atau kerangka (*framework*).\n\n KEMUDIAN sajikan FLOWCHART ASCII spesifik untuk judul ini:\n Setiap tanda kurung [...] WAJIB diisi — bukan template generik.\n]\n\n*FLOWCHART* DESAIN PENELITIAN:\n\n    +--------------------------------------------------+\n    |  FASE 1: Kajian Literatur & Identifikasi         |\n    |  Kesenjangan                                     |\n    |  - [Sumber literatur spesifik untuk judul ini]  |\n    |  - [Kesenjangan dari Modul 4 yang dialamatkan]  |\n    |  - [Hipotesis atau pertanyaan penelitian]        |\n    +--------------------------------------------------+\n                            |\n                            v\n    +--------------------------------------------------+\n    |  FASE 2: Pengumpulan Data                        |\n    |  - [Dataset / populasi spesifik]                 |\n    |  - [Metode pengambilan sampel]                   |\n    |  - [Ukuran sampel: N≥[angka] — justifikasi:     |\n    |     [teknik] butuh min. [angka] responden]       |\n    |  - [Instrumen: kuesioner/skala tervalidasi]      |\n    +--------------------------------------------------+\n                            |\n                            v\n    +--------------------------------------------------+\n    |  FASE 3: Uji Asumsi & Pra-Analisis              |\n    |  - [Uji normalitas: Shapiro-Wilk / K-S]         |\n    |  - [Uji multikolinearitas: VIF < 10]            |\n    |  - [Uji homoskedastisitas: Breusch-Pagan]       |\n    |  - [*Mean-centering* jika ada moderasi]          |\n    +--------------------------------------------------+\n                            |\n                            v\n    +--------------------------------------------------+\n    |  FASE 4: [Nama Teknik Analisis Utama]            |\n    |  - [Perangkat lunak: SPSS / AMOS / SmartPLS]    |\n    |  - [Model spesifik: PROCESS Model [N] / SEM]    |\n    |  - [Estimasi: *Maximum Likelihood* / *PLS*]      |\n    |  - [*Bootstrap*: [N] sampel jika relevan]        |\n    +--------------------------------------------------+\n                            |\n                            v\n    +--------------------------------------------------+\n    |  FASE 5: Evaluasi & Interpretasi Hasil           |\n    |  - [Indeks kecocokan model yang dilaporkan]      |\n    |  - [Nilai ambang batas yang digunakan]           |\n    |  - [Perbandingan dengan baseline: makalah mana?] |\n    +--------------------------------------------------+\n                            |\n                            v\n    +--------------------------------------------------+\n    |  FASE 6: Diseminasi & Luaran                     |\n    |  - [Jurnal target: Scopus Q[N] / SINTA 2 ...]   |\n    |  - [HKI/paten jika berlaku]                      |\n    |  - [Dataset *open access* jika berlaku]          |\n    +--------------------------------------------------+\n\n---\n\n### 6. Kesenjangan Penelitian yang Dialamatkan (≈250 kata)\n\n[Paragraf penuh. Eksplisitkan koneksi ke Modul 4:\n\n (a) KESENJANGAN UTAMA (≈100 kata):\n     \"Penelitian ini secara spesifik mengalamatkan Kesenjangan #[N] dari\n      Modul 4: '[Nama Kesenjangan]'. Kesenjangan ini diklasifikasikan sebagai\n      Tipe [1/2/3] ([Diakui/Tersirat/Absen]) dengan Skor Prioritas [2–6]\n      dan resolubilitas [*Resolvable*/*Partially resolvable*/*Structural*].\"\n      [Pengarang, Tahun — makalah terdekat dari Modul 4]\n\n (b) MAKALAH TERDEKAT & KETERBATASANNYA (≈80 kata):\n     \"Makalah yang paling mendekati kesenjangan ini adalah\n      [Pengarang, Tahun][L-level], yang [apa yang mereka lakukan].\n      Namun, mereka berhenti pada [batas spesifik]. Penelitian ini\n      melampaui keterbatasan tersebut dengan [pendekatan spesifik].\"\n\n (c) CARA KESENJANGAN DIISI (≈70 kata):\n     \"Setelah penelitian ini selesai, pertanyaan '[pertanyaan gap spesifik]'\n      akan terjawab dengan bukti tingkat [L-level target]. Modul 4 menandai\n      jalur resolusi sebagai [jalur dari Modul 4 — metodologi + data +\n      sumber daya]; penelitian ini mengikuti jalur tersebut dengan [spesifik].\"\n\n ATURAN:\n  - Harus rujuk OUTPUT Modul 4 secara eksplisit (Kesenjangan #, Tipe,\n    Skor Prioritas)\n  - Jangan tulis \"diperlukan penelitian lebih lanjut\" — itu terlalu umum\n  - Tulis: \"Secara spesifik, tidak ada studi dalam korpus yang memeriksa\n            [X] di bawah kondisi [Y] menggunakan teknik [Z]\"\n]\n\n==============================================================\nLANJUT KE REKOMENDASI [N+1]\n==============================================================\n\n================================================================\nPANDUAN ANALISIS STATISTIK PER TEKNIK\n(Disisipkan AI ke dalam Seksi 5 setiap rekomendasi yang relevan)\n================================================================\n\nTEKNIK A — REGRESI LINEAR MULTIVARIAT (*Multivariate Linear Regression*)\n\nPersamaan model:\nY = β₀ + β₁X₁ + β₂X₂ + β₃X₃ + ... + βₖXₖ + ε\n\nUji asumsi WAJIB:\n1. Linearitas             : *scatter plot* Y vs setiap X\n2. Independensi residual  : Durbin-Watson (1,5 < DW < 2,5)\n3. Homoskedastisitas      : uji Breusch-Pagan / White (p > 0,05)\n4. Normalitas residual    : uji Shapiro-Wilk / K-S (p > 0,05)\n5. Non-multikolinearitas  : VIF < 10 untuk setiap prediktor\n6. Tidak ada *outlier* berat: *Cook's Distance* < 1\n7. Ukuran sampel minimum  : 50 + 8(k), di mana k = jumlah prediktor\n\nDataset siap pakai:\n- UCI Machine Learning Repository: https://archive.ics.uci.edu/\n  Filter: *Multivariate* / *Regression*\n- Kaggle: https://www.kaggle.com/datasets\n  Filter: *regression*, *social-science*, [domain spesifik]\n- BPS: https://www.bps.go.id/ — Tabel Dinamis\n- data.go.id: https://data.go.id — filter bidang sesuai topik\n- Harvard Dataverse: https://dataverse.harvard.edu/\n- Zenodo: https://zenodo.org/\n[PERHATIAN: Tandai [Perlu verifikasi akses] jika URL tidak dapat dikonfirmasi]\n\nSintaks SPSS (*ready-to-run*):\nREGRESSION\n  /MISSING LISTWISE\n  /STATISTICS COEFF OUTS CI(95) R ANOVA COLLIN TOL\n  /CRITERIA=PIN(.05) POUT(.10)\n  /NOORIGIN\n  /DEPENDENT Y\n  /METHOD=ENTER X1 X2 X3\n  /SCATTERPLOT=(*ZRESID ,*ZPRED)\n  /RESIDUALS DURBIN HISTOGRAM(ZRESID) NORMPROB(ZRESID)\n  /SAVE COOK LEVER ZRESID.\n\nInterpretasi output:\n1. R²       : variansi Y yang dijelaskan model (target > 0,30)\n2. Uji-F    : signifikansi keseluruhan model (p < 0,05)\n3. β (*Beta*): koefisien terstandarisasi untuk perbandingan kekuatan\n4. t & p    : signifikansi tiap prediktor (p < 0,05)\n5. VIF      : multikolinearitas (harus < 10)\n6. Durbin-Watson: autokorelasi (1,5–2,5)\n\n---\n\nTEKNIK B — ANALISIS MODERASI (*Moderation Analysis*)\n\nModel dasar:\nY = β₀ + β₁X + β₂Z + β₃(X×Z) + ε\n\nVariabel:\n- X   = prediktor utama (*predictor*)\n- Z   = moderator (memperkuat/memperlemah efek X→Y)\n- X×Z = *interaction term* (KRITIS untuk moderasi)\n- Y   = hasil (*outcome*)\n\nUkuran sampel minimum: 100 + 50 per prediktor\n\nAlat analisis: SPSS + PROCESS Macro oleh Hayes (gratis)\nUnduhan: https://www.processmacro.org/download.html\nModel yang digunakan: MODEL 1 (moderasi sederhana)\n\nSintaks SPSS + PROCESS:\nPROCESS Y=Y/X=X/W=Z/MODEL=1/CENTER=1/PLOT=1/JN=1.\n\nOutput yang dihasilkan:\n- Koefisien untuk X, Z, X×Z\n- *Conditional effects* pada level Z (−1SD, Rata-rata, +1SD)\n- Wilayah signifikansi *Johnson-Neyman*\n- Plot interaksi (otomatis)\n\n---\n\nTEKNIK C — ANALISIS MEDIASI/INTERVENING (*Mediation Analysis*)\n\nModel dasar (Baron-Kenny 1986 + Hayes 2018):\n\n       X ────c'────→ Y   (pengaruh langsung / *direct effect*)\n       │              ↑\n       a              b\n       ↓              │\n       M ─────────────┘  (pemediasi / *mediator*)\n\nPengaruh total: c = c' + (a × b)\nPengaruh tidak langsung (*indirect effect*): a × b\n\nTipe mediasi:\n- Mediasi penuh (*full mediation*) : c' tidak signifikan, a×b signifikan\n- Mediasi parsial (*partial mediation*): c' signifikan, a×b juga signifikan\n- Tanpa mediasi (*no mediation*)   : a×b tidak signifikan\n\nUkuran sampel minimum: 200 (untuk *bootstrap* yang andal)\n\nMetode yang DIREKOMENDASIKAN: *Bootstrapping* (Hayes)\n- *Bootstrap* 5000 sampel\n- *Confidence Interval* 95% untuk a×b\n- Jika CI tidak melewati 0 → mediasi signifikan\n\nSintaks SPSS + PROCESS (MODEL 4):\nPROCESS Y=Y/X=X/M=M/MODEL=4/BOOT=5000/CONF=95.\n\nAlternatif AMOS: *Bootstrap ML* 5000 sampel, *Bias-corrected CI* 95%\nAlternatif SmartPLS: *Bootstrapping* 5000 subsampel, cek *Total Effects*\n\n---\n\nTEKNIK D — ANALISIS JALUR / SEM PENUH (*Path Analysis* / *Full SEM*)\n\n*Path Analysis* = SEM dengan variabel teramati (*observed variables*) saja\n*Full SEM*      = *path analysis* + variabel laten (*latent variables*) dengan\n                  banyak indikator\n\nUkuran sampel minimum: 200 (aturan umum: 10× jumlah parameter)\n\nINDEKS KECOCOKAN MODEL (*goodness-of-fit indices*) WAJIB dilaporkan:\n\nUntuk *CB-SEM* (AMOS):\n- χ²/df      : < 3,0 (baik), < 5,0 (dapat diterima)\n- GFI        : > 0,90\n- AGFI       : > 0,90\n- CFI        : > 0,95 (unggul), > 0,90 (dapat diterima)\n- TLI/NNFI   : > 0,95\n- RMSEA      : < 0,05 (unggul), < 0,08 (dapat diterima)\n- SRMR       : < 0,08\n\nUntuk *PLS-SEM* (SmartPLS):\n- *Composite Reliability* (CR)  : > 0,70\n- *Average Variance Extracted* (AVE): > 0,50\n- Validitas diskriminan (*Discriminant Validity*): Fornell-Larcker /\n  HTMT < 0,85\n- R² (*R-square*)               : substansial (>0,26), sedang (0,13–0,26)\n- Q² (*predictive relevance*)   : > 0\n- SRMR                          : < 0,08\n- NFI                           : > 0,90\n\nPANDUAN MEMILIH AMOS vs SmartPLS:\n\n  Gunakan AMOS (*CB-SEM*) jika:\n  - Ukuran sampel > 200\n  - Data normal secara multivariat\n  - Orientasi konfirmasi teori (*theory-confirmation*)\n  - Model sederhana–menengah\n\n  Gunakan SmartPLS (*PLS-SEM*) jika:\n  - Ukuran sampel < 200 (*small sample*)\n  - Data tidak normal\n  - Orientasi eksploratori / prediksi\n  - Model kompleks (banyak konstruk)\n  - Indikator formatif (*formative indicators*) hadir\n\n================================================================\nRINGKASAN PORTOFOLIO\n(DI AKHIR — SETELAH 10 REKOMENDASI)\n================================================================\n\n| No | Judul (8 kata) | Tipe Slot | Teknik Utama | Target | Kesenjangan M4 | Kontradiksi M2 | Dampak | Keterlaksanaan |\n|----|----------------|-----------|--------------|--------|----------------|----------------|--------|----------------|\n| 1  | ...            | Perluasan | *MLR*        | SINTA 2| Kes. #2        | -              | Sedang | Tinggi         |\n| 2  | ...            | Res. Kontr| *SEM*        | Scopus Q1| Kes. #1     | Kontr. #3      | Tinggi | Sedang         |\n| ...| ...            | ...       | ...          | ...    | ...            | ...            | ...    | ...            |\n\nNARASI SINTESIS (≈200 kata):\n  - Distribusi target: berapa Q1, berapa Q2–Q4, berapa SINTA 2 [Analisis]\n  - Distribusi teknik: apakah sudah beragam dan konsisten dengan Modul 5?\n  - Distribusi kesenjangan: apakah 10 judul mengisi 5 kesenjangan secara seimbang?\n  - Rekomendasi prioritas: 3 judul TERATAS untuk dilanjutkan ke Modul 7\n    (justifikasi mengacu pada skor prioritas Modul 4 dan audit Modul 5)\n\n================================================================\nGERBANG KUALITAS — WAJIB SEBELUM MENGIRIM OUTPUT\n================================================================\n\nGerbang  1: Apakah 10 rekomendasi tersedia? (laporkan jika kurang)\nGerbang  2: Apakah setiap rekomendasi ≈2500 kata?\nGerbang  3: Apakah setiap *flowchart* spesifik dan berbeda?\nGerbang  4: Apakah setiap sitasi dari korpus Modul 1?\nGerbang  5: Apakah Modul 5 diintegrasikan secara eksplisit?\nGerbang  6: Apakah distribusi 10 judul mengikuti strategi 5-tipe slot?\nGerbang  7: Apakah min. 3 judul bertarget Scopus Q1 dan min. 2 SINTA 2?\nGerbang  8: Apakah teknik analisis (*MLR/Moderasi/Mediasi/SEM*) disebutkan\n             secara eksplisit di setiap j unakan: \"AKTIFKAN: MODUL 9 BATCH [1–5 / 6–10]\"\n  AI akan menghasilkan 5 rekomendasi per sesi.\n", "m10": "AKTIFKAN: MODUL 10 — DRAF ARTIKEL IMRAD\nTOPIK: [TOPIC_INPUT]\nSKEMA TARGET: [SCHEME_INPUT]\n\n★ INSTRUKSI PEMBUKA — WAJIB DIBACA\n================================================================\nBaca dan susun secara logis, jaga integritas dan konsistensi, hindari\nhalusinasi dan data palsu. Istilah asing tidak diserap ditulis *miring* (PUBEI).\nGunakan hanya tanda baca: . , ; : - ? ! \" \" ' ' ( ) [ ] / ...\nTerapkan Protokol Gaya Penulisan Natural (Seksi P Core Layer) tanpa melanggar\nintegritas. JANGAN mengklaim keluaran \"bukan AI\" atau \"lolos detektor\".\nKODE SESI: [KODE]\n================================================================\n\n================================================================\nPROTOKOL KANVAS BARU (WAJIB) — MENJAGA BATAS/LIMIT\n================================================================\nKeluaran Modul 10 panjang. Untuk mencegah tertabraknya batas panjang per\nkanvas (terutama Canvas ChatGPT) dan menjaga keterbacaan:\n\n- Tulis SETIAP segmen besar pada KANVAS/DOKUMEN BARU yang TERPISAH.\n  JANGAN menambahkan ke kanvas sebelumnya; selalu mulai kanvas baru.\n- Segmen yang dipisah per kanvas:\n    Kanvas 1 : Introduction\n    Kanvas 2 : Methods\n    Kanvas 3 : Results\n    Kanvas 4 : Discussion\n    Kanvas 5 : Penutup (Conclusion, Abstract, Keywords, 5 Judul, Daftar Pustaka)\n- Beri judul setiap kanvas dengan prefiks kode sesi, contoh:\n    \"[KODE] - Introduction\", \"[KODE] - Methods\", dan seterusnya.\n- Padanan istilah lintas-AI (gunakan yang sesuai platform Anda):\n    ChatGPT -> buka Canvas baru\n    Claude  -> buat Artifact baru\n    Gemini  -> buka Canvas/dokumen baru\n    Lainnya -> buat dokumen/jawaban terpisah baru\n- Di AKHIR setiap kanvas, beri penanda lanjut:\n    \"=== AKHIR [segmen] === | Untuk lanjut di KANVAS BARU, ketik: LANJUT [segmen berikutnya]\"\n- KONSISTENSI antar-kanvas WAJIB: pakai KODE SESI s n    jawab penulis sebelum pengajuan.]\n\n================================================================\nGERBANG KUALITAS MODUL 10 (WAJIB sebelum mengirim)\n================================================================\nG1: Sumber data jelas dari Modul 8 ATAU Modul 9?\nG2: Tiap bagian IMRAD ~750 kata dengan 3 sub-heading paragraf penuh?\nG3: Tiap bagian IMRAD diakhiri 6 pertanyaan literatur Bahasa Inggris?\nG4: Methods sesuai bidang (flowchart+2 novelty / 4 metode soshum)?\nG5: Results sesuai bidang (tabel perbandingan / penyandingan empiris)?\nG6: Discussion menjawab I-M-R?\nG7: Conclusion ~250 kata dengan angka kuantitatif nyata?\nG8: Abstract ~300 kata, disusun terpisah dari Conclusion?\nG9: 5 keyword satu suku kata, general, dipisah titik koma?\nG10: Tepat 5 rekomendasi judul standar Scopus Q1 ada (dengan anotasi sudut)?\nG11: Daftar pustaka APA 7 tanpa DOI fabrikasi (ditandai jika ragu)?\nG12: Bahasa sesuai skema (Q1 Inggris penuh / SINTA 2 badan Indonesia)?\nG13: PUBEI dan Gaya Natural (Seksi P) diterapkan; tanda baca sesuai himpunan?\nG14: Tiap segmen besar ditulis pada KANVAS BARU terpisah dengan penanda lanjut?\nJika ada gerbang gagal: perbaiki sebelum kirim, catat\n\"KOREKSI OTOMATIS DITERAPKAN: [deskripsi]\".\n\n================================================================\nATURAN ANTI-HALUSINASI (WAJIB)\n================================================================\n1. Setiap sitasi [Pengarang, Tahun] merujuk korpus Modul 1.\n2. Angka kuantitatif berasal dari Results/sumber; jika tidak ada, tandai\n   [Angka memerlukan studi primer] - jangan mengarang.\n3. DOI hanya dari korpus; jika ragu tulis [DOI perlu verifikasi di doi.org].\n4. Komponen novelty pada flowchart harus kontribusi nyata, bukan placeholder.\n5. Pengungkapan AI (Seksi O.2) tetap wajib sebelum pengajuan jurnal.\n", "m11": "AKTIFKAN: MODUL 11 — PROPOSAL HIBAH BIMA\nTOPIK: [TOPIC_INPUT]\nSKEMA: [SCHEME_INPUT]\n\n★ INSTRUKSI PEMBUKA — WAJIB DIBACA\n================================================================\nBaca dan susun secara logis, jaga integritas dan konsistensi, hindari\nhalusinasi dan data palsu. Istilah asing tidak diserap ditulis *miring* (PUBEI).\nGunakan hanya tanda baca: . , ; : - ? ! \" \" ' ' ( ) [ ] / ...\nTerapkan Protokol Gaya Penulisan Natural (Seksi P Core Layer). JANGAN mengklaim\nkeluaran \"bukan AI\" atau \"lolos detektor\". KODE SESI: [KODE]\n================================================================\n\n================================================================\nPROTOKOL KANVAS BARU (WAJIB) — MENJAGA BATAS/LIMIT\n================================================================\nATURAN INTI (tidak dapat dilanggar):\n1. SATU KANVAS = SATU SEGMEN. Jangan pernah menggabungkan dua segmen dalam satu\n   kanvas, dan jangan pernah menambahkan segmen baru ke kanvas yang sudah terisi.\n2. SEBELUM menulis segmen berikutnya, BUAT KANVAS/DOKUMEN BARU lebih dulu.\n   Beri judul kanvas dengan prefiks kode sesi, contoh: \"[KODE] - Segmen 2\".\n3. SELESAIKAN satu segmen penuh dalam satu kanvas. JANGAN memulai segmen\n   berikutnya pada respons yang sama; berhenti dan tunggu aba-aba \"LANJUT\".\n4. Jika ruang kanvas mulai menipis di TENGAH satu segmen, jangan memadatkan atau\n   memotong isi. Tutup dengan penanda \"[BERSAMBUNG — ketik LANJUT untuk sisa\n   segmen ini di kanvas baru]\" lalu lanjutkan sisanya di kanvas baru saat diminta.\n5. JANGAN menulis ulang segmen yang sudah selesai; cukup rujuk judulnya.\n\nPEMETAAN ISTILAH LINTAS-AI (gunakan sesuai platform):\n   ChatGPT -> buka Canvas baru   |  Claude -> buat Artifact baru\n   Gemini  -> buka Canvas baru    |  Lainnya -> buat dokumen/jawaban terpisah baru\nFALLBACK: jika platform TIDAK mendukung kanvas terpisah, tulis tiap segmen\nsebagai blok berjudul jelas yang dipisah garis pemisah, tetap berurutan, satu\nsegmen per respons.\n\nKONSISTENSI ANTAR-KANVAS (WAJIB sama di semua kanvas):\n   KODE SESI, penomoran makalah, glosarium Modul 1, skema/bidang, dan novelty\n   yang sudah dikunci. Akhiri tiap kanvas dengan:\n   \"=== AKHIR [nama segmen] === | Untuk lanjut di KANVAS BARU, ketik: LANJUT [nama segmen berikutnya]\"\n================================================================\nSEGMEN PER KANVAS (Modul 11 - Proposal BIMA):\n   Kanvas 1: Identitas + Ringkasan + Kata Kunci\n   Kanvas 2: Pendahuluan (latar, masalah, pendekatan, SoTA, novelty, roadmap)\n   Kanvas 3: Metode (diagram alir + novelty)\n   Kanvas 4: TKT + Luaran + Kemitraan\n   Kanvas 5: RAB + Jadwal + Daftar Pustaka\n================================================================\n\nPEMERIKSAAN PRA-KONDISI (WAJIB sebelum output)\n================================================================\n1. Modul 0-7 selesai? [Ya/Tidak]. Sumber data lanjutan, pilih SATU:\n     JALUR A -> Modul 8 (rencana Dataset)   : [Ya/Tidak]\n     JALUR B -> Modul 9 (rancangan Statistik): [Ya/Tidak]\n   Jika keduanya kosong: BERHENTI, minta pengguna jalankan Modul 8 atau 9.\n2. Baca SKEMA (pilihan pengguna) — tentukan sub-template:\n     ( ) PDP  — Penelitian Dosen Pemula (Penelitian Dasar)\n     ( ) PFR  — Penelitian Fundamental Reguler (Penelitian Dasar)\n     ( ) Terapan Luaran Model (Penelitian Terapan)\n     ( ) Terapan Luaran Prototipe (Penelitian Terapan)\n3. Baca BIDANG ILMU (Seksi L): Saintek/Ilmu Komputer -> Metode JALUR MODEL;\n   Umum/Sosial-Humaniora -> Metode JALUR SOSHUM.\n4. Baca MASA PENELITIAN (penentu jumlah novelty):\n     PDP      -> 1 tahun (tetap) -> 1 novelty\n     PFR      -> user pilih 1 tahun (1 novelty) / multiyear (2 novelty)\n     Terapan  -> user pilih 1 tahun (1 novelty) / multiyear (2 novelty)\n   [Semua ketentuan masa, dana, TKT, jumlah kata WAJIB ditandai:\n    \"[verifikasi panduan BIMA terbaru — bima.kemdiktisaintek.go.id]\"]\n\n================================================================\nBOBOT PENILAIAN PER SKEMA (PENYELARAS KRITERIA — BUKAN JAMINAN LOLOS)\n================================================================\nGunakan bobot ini untuk memberi PENEKANAN penulisan pada butir bernilai tinggi.\nCatatan jujur: bobot membantu menyelaraskan proposal dengan kriteria reviewer,\nTETAPI tidak menjamin kelolosan; itu tergantung kompetisi, kuota, rekam jejak\npengusul, dan penilaian reviewer.\n\n| Butir Penilaian                                   | PDP | Dasar-lain | Terapan |\n|---------------------------------------------------|-----|------------|---------|\n| Ketajaman perumusan masalah                       | 15  | 15         | 10      |\n| Inovasi pendekatan pemecahan masalah              | 15  | 10         | 10      |\n| State of the art dan kebaruan                     | 12  | 10         | 10      |\n| Akurasi peta jalan (roadmap)                      | 15  | 10         | 5       |\n| Akurasi metode penelitian                         | 10  | 10         | 5       |\n| Kejelasan pembagian tugas tim                     | 5   | 5          | 5       |\n| Kesesuaian metode-waktu-luaran-fasilitas          | 10  | 10         | 10      |\n| Kredibilitas mitra dan dukungan                   | 0   | 0          | 5       |\n| Kebaruan referensi                                | 5   | 5          | 5       |\n| Relevansi dan kualitas referensi                  | 5   | 10         | 5       |\n\nTarget skor tertinggi (acuan kualitas, deskriptor skor 4):\n- Perumusan masalah: tajam dan spesifik.\n- Pendekatan: inovatif.\n- State of the art: menggunakan pendekatan baru.\n- Roadmap: jelas, ADA penelitian yang mendasari, ADA keterkaitan milestone\n  dengan usulan penelitian.\n- Metode: akurat dan sinkron dengan waktu, luaran, fasilitas.\n- Tim: pembagian jelas dan sesuai kepakaran.\n- Mitra (Terapan): kredibel dan dukungan signifikan.\n- Referensi: pustaka primer dan mutakhir > 80%, relevan, jurnal bereputasi.\n\n================================================================\nSTRUKTUR PROPOSAL — IKUTI URUTAN INI\n================================================================\n\nA. JUDUL\n   Maksimal 20 kata. Spesifik, memuat variabel/objek, pendekatan, dan konteks.\n\nB. RINGKASAN (tidak lebih dari 300 kata) [verifikasi panduan BIMA]\n   Berisi urgensi, tujuan, metode, dan luaran yang ditargetkan.\n   Luaran wajib: artikel publikasi, HKI, judul Buku Monograf, judul Buku Ajar.\n\nC. KATA KUNCI\n   5 kata kunci, dipisahkan titik koma. Masing-masing berupa SATU KATA/istilah\n   tunggal (bukan frasa dua kata atau lebih).\n   Contoh: UMKM; Marketplace; Emosi; Loyalitas; Sentimen\n\nD. PENDAHULUAN (tidak lebih dari 1000 kata) [verifikasi panduan BIMA]\n   Sitasi: gaya APA (untuk draft dan kemudahan reference manager).\n\n   D.1. LATAR BELAKANG DAN RUMUSAN MASALAH\n        A. Latar Belakang\n           - Uraikan fenomena dan urgensi.\n           - Tambahkan informasi grafik/data atas permasalahan, lampirkan\n             tautan sumber yang VALID. Jika tautan tidak tersedia atau tidak\n             yakin: tulis \"[sumber data perlu dilampirkan/diverifikasi]\" —\n             JANGAN mengarang URL atau angka.\n        B. Rumusan Masalah — buat TEPAT 3 rumusan.\n        C. Urgensi Penelitian.\n        [Pertanyaan Literatur — untuk pencarian referensi, hapus sebelum submit]\n        1-5. [Lima pertanyaan literatur Bahasa Inggris untuk komponen ini.]\n\n   D.2. PENDEKATAN PEMECAHAN MASALAH\n        Tuliskan pendekatan dan strategi pemecahan masalah yang dirumuskan.\n        [Pertanyaan Literatur — untuk pencarian referensi, hapus sebelum submit]\n        1-5. [Lima pertanyaan literatur Bahasa Inggris.]\n\n   D.3. STATE OF THE ART DAN KEBARUAN\n        A. Riset Gap (rujuk Modul 4).\n        B. State of the Art (rujuk korpus Modul 1).\n        C. Kebaruan (aspek pendekatan, metode, dsb).\n        [Pertanyaan Literatur — untuk pencarian referensi, hapus sebelum submit]\n        1-5. [Lima pertanyaan literatur Bahasa Inggris.]\n\n   D.4. PETA JALAN PENELITIAN (ROADMAP 5 TAHUN — GAYA FISHBONE)\n        Tampilkan roadmap 5 tahun bergaya fishbone (tulang ikan):\n        - Tulang utama horizontal = garis waktu Tahun 1 sampai Tahun 5.\n        - Setiap duri = capaian/luaran pada tahun tersebut.\n        - Tunjukkan tahapan yang sudah dicapai, sedang, dan direncanakan, serta\n          keterkaitan milestone dengan usulan (acuan skor tertinggi).\n        Render ASCII seperti kerangka berikut, lalu beri instruksi agar AI\n        tujuan menggambar versi visual bila platform mendukung:\n\n            Capaian1     Capaian2     Capaian3     Capaian4\n                \\           \\            /            /\n            Th-1 ----- Th-2 ----- Th-3 ----- Th-4 ----- Th-5 ==> TUJUAN AKHIR\n                /           /            \\            \\\n            Luaran1      Luaran2      Luaran3      Luaran4\n\n        [Pertanyaan Literatur — untuk pencarian referensi, hapus sebelum submit]\n        1-5. [Lima pertanyaan literatur Bahasa Inggris.]\n\nE. METODE (tidak lebih dari 1000 kata) [verifikasi panduan BIMA]\n   Wajib memuat: diagram alir penelitian; proses, luaran, indikator capaian;\n   anggota tim/mitra penanggung jawab tiap tahap; sejalan dengan RAB.\n\n   E.A. DESAIN PENELITIAN\n        Pilih JALUR sesuai bidang:\n        - JALUR MODEL (Saintek/Ilmu Komputer): rancangan pengembangan model/\n          metode; data dari JALUR A (Modul 8) atau JALUR B (Modul 9).\n        - JALUR SOSHUM (Umum/Sosial-Humaniora): pilih dari empat metode populer:\n            1 Kuantitatif (kuesioner; Regresi/SEM; SPSS/SmartPLS/Analisis Jalur)\n            2 Kualitatif (Etnografi/Fenomenologi; wawancara; observasi)\n            3 Humaniora (studi teks; hermeneutika; analisis wacana kritis)\n            4 Mixed Methods (gabungan angka dan narasi)\n\n   E.B. PROSEDUR PENELITIAN — DIAGRAM ALIR ALGORITMA\n        Sajikan ALGORITMA FLOWCHART (ASCII). Tandai kebaruan (NOVELTY) dengan\n        garis PUTUS-PUTUS BERWARNA di LUAR kotak proses. Jumlah novelty:\n        - 1 NOVELTY jika masa penelitian 1 tahun.\n        - 2 NOVELTY jika masa penelitian multiyear.\n        Sebut warna penanda (mis. \"penanda merah\", \"penanda biru\"). Contoh:\n\n            +-----------------------------+\n            |  Input / Data ([M8 atau M9])|\n            +-----------------------------+\n                        |\n                        v\n            +-----------------------------+\n            |  Praproses                  |\n            +-----------------------------+\n                        |\n                        v\n            ...............................   <- NOVELTY 1 (penanda berwarna)\n            :  +-----------------------+  :\n            :  |  [Komponen kebaruan 1]|  :\n            :  +-----------------------+  :\n            ...............................\n                        |\n                        v\n            +-----------------------------+\n            |  Proses Inti                |\n            +-----------------------------+\n                        |\n                        v\n            ...............................   <- NOVELTY 2 (hanya jika multiyear)\n            :  +-----------------------+  :\n            :  |  [Komponen kebaruan 2]|  :\n            :  +-----------------------+  :\n            ...............................\n                        |\n                        v\n            +-----------------------------+\n            |  Evaluasi / Output          |\n            +-----------------------------+\n\n        Instruksi: AI tujuan boleh menggambar versi visual (mis. diagram) bila\n        platform mendukung; format gambar akhir dapat JPG/PNG saat disubmit.\n        Jelaskan tiap novelty 2-3 kalimat; isi dengan kontribusi nyata, bukan\n        placeholder.\n\n   E.C. INDIKATOR CAPAIAN YANG DITARGETKAN\n        Tabel 1. Luaran Penelitian dan Indikator Capaian\n        | Tahun | Luaran | Indikator Capaian | Status (rencana/tercapai) |\n        |-------|--------|-------------------|---------------------------|\n\n   E.D. SUSUNAN TIM PENELITI DAN ALOKASI WAKTU\n        Tabel 2. Susunan Tim Peneliti dan Alokasi Waktu\n        | Nama | Peran | Kepakaran | Tugas | Alokasi (jam/minggu) |\n        |------|-------|-----------|-------|----------------------|\n        (Pembagian tim jelas dan sesuai kepakaran — acuan skor tertinggi.)\n\n   E.E. ANALISA DATA\n        Uraikan teknik analisis sesuai jalur metode dan sumber M8/M9.\n\n   [KHUSUS SKEMA TERAPAN — tambahan wajib:]\n   E.F. STRATEGI PENCAPAIAN TKT\n        Nyatakan TKT awal -> TKT target dan cara mencapainya selama penelitian.\n\nF. HASIL YANG DIHARAPKAN\n   A. Publikasi Ilmiah (luaran wajib).\n   B. Pengembangan Model.\n   C. Penerbitan Buku Monograf dan Buku Ajar.\n   D. Pendaftaran Hak Kekayaan Intelektual (HKI).\n   E. Dampak hasil penelitian pada tahun ke-5 mendatang.\n   F. Dampak bagi ilmu pengetahuan, masyarakat, dan hilirisasi industri.\n\n   [TINGKAT KESIAPTERAPAN TEKNOLOGI (TKT) — TABEL UMUM 9 TINGKAT]\n   1 Prinsip dasar diteliti dan dilaporkan.\n   2 Formulasi konsep dan/atau aplikasi formulasi.\n   3 Pembuktian konsep fungsi/karakteristik penting (analitis dan eksperimental).\n   4 Validasi komponen/subsistem di lingkungan laboratorium.\n   5 Validasi komponen/subsistem di lingkungan relevan.\n   6 Demonstrasi model/prototipe sistem/subsistem di lingkungan relevan.\n   7 Demonstrasi prototipe sistem di lingkungan sebenarnya.\n   8 Sistem lengkap dan handal (uji dan demonstrasi di lingkungan sebenarnya).\n   9 Sistem teruji/terbukti melalui keberhasilan pengoperasian.\n   Rentang lazim per skema (penalaran logis, WAJIB verifikasi panduan BIMA):\n   - PDP dan PFR        : TKT 1-3  [verifikasi panduan BIMA]\n   - Terapan Model      : TKT 4-6  [verifikasi panduan BIMA]\n   - Terapan Prototipe  : TKT 6+   [verifikasi panduan BIMA]\n\n   [KHUSUS SKEMA TERAPAN — RENCANA KEMITRAAN (WAJIB):]\n   - Surat Kesediaan Mitra (pernyataan resmi mitra).\n   - Surat Perjanjian Kerja Sama (MoU/MoA).\n   - Uraikan kredibilitas mitra dan bentuk dukungan (acuan skor tertinggi).\n\nG. JADWAL PENELITIAN\n   Sesuaikan jumlah tahun: 1 tahun, atau multiyear (minimal 2, maksimal 3 tahun).\n   Untuk tiap tahun, gunakan 13 kegiatan baku (matriks bulan 1-12):\n   1 Persiapan Penelitian\n   2 Fenomena Lapangan/Data\n   3 Identifikasi Akar Masalah Penelitian\n   4 Perumusan Masalah\n   5 Pendekatan Pemecahan Masalah\n   6 Pengumpulan Data\n   7 Verifikasi Data\n   8 Interpretasi Data\n   9 Pembuatan/Pelaksanaan Penelitian\n   10 Penyusunan Laporan Kemajuan\n   11 Penyusunan Laporan Wajib\n   12 Penyusunan Luaran Akhir\n   13 Penyusunan Luaran Tambahan\n   Format: | No | Nama Kegiatan | Bln 1 | 2 | ... | 12 | (tandai X pada bulan aktif)\n\nH. DAFTAR PUSTAKA\n   Hanya pustaka yang disitasi yang dicantumkan. Untuk draft, gunakan gaya APA\n   (kemudahan reference manager), penomoran mengikuti urutan pengutipan.\n   ATURAN ANTI-FABRIKASI: sumber hanya dari korpus Modul 0/1; DOI dicantumkan\n   hanya jika dari korpus dan lengkap (format https://doi.org/[DOI]); jika ragu\n   tulis \"[DOI perlu verifikasi di doi.org]\". Utamakan pustaka primer dan\n   mutakhir (acuan skor: > 80% primer dan mutakhir).\n\n================================================================\nGERBANG KUALITAS MODUL 11 (WAJIB sebelum kirim)\n================================================================\nG1 : Sumber jelas dari Modul 8 ATAU Modul 9?\nG2 : Sub-template sesuai skema (PDP/PFR/Terapan Model/Terapan Prototipe)?\nG3 : Judul <= 20 kata; Ringkasan <= 300 kata; Pendahuluan <= 1000 kata;\n     Metode <= 1000 kata? (semua angka bertanda verifikasi)\nG4 : 5 kata kunci satu kata, dipisah titik koma?\nG5 : Rumusan masalah TEPAT 3?\nG6 : Roadmap fishbone 5 tahun dengan keterkaitan milestone-usulan?\nG7 : Metode sesuai bidang (flowchart+novelty / 4 metode soshum)?\nG8 : Jumlah novelty sesuai masa (1 tahun=1; multiyear=2), garis putus berwarna?\nG9 : Tabel 1 (indikator capaian) dan Tabel 2 (tim) ada?\nG10: Skema Terapan -> Strategi Pencapaian TKT + Kemitraan (Surat+MoU) ada?\nG11: TKT awal->target (Terapan) dan rentang TKT bertanda verifikasi?\nG12: Jadwal 13 kegiatan sesuai jumlah tahun (1 / 2-3)?\nG13: Daftar pustaka APA, anti-fabrikasi DOI, mayoritas primer-mutakhir?\nG14: Bobot penilaian skema dipakai sebagai penekanan (bukan jaminan lolos)?\nG15: Pertanyaan literatur dalam blok \"hapus sebelum submit\", tidak menabrak\n     batas kata?\nG16: Tiap segmen besar pada KANVAS BARU terpisah dengan penanda lanjut?\nG17: PUBEI dan Gaya Natural (Seksi P) diterapkan; tanda baca sesuai himpunan?\nJika ada gerbang gagal: perbaiki sebelum kirim, catat\n\"KOREKSI OTOMATIS DITERAPKAN: [deskripsi]\".\n\n================================================================\nATURAN ANTI-HALUSINASI (WAJIB)\n================================================================\n1. Sitasi [Pengarang, Tahun] merujuk korpus Modul 1.\n2. Angka panduan (kata, dana, RAB, TKT, masa) ditandai verifikasi panduan BIMA.\n3. DOI hanya dari korpus; jika ragu \"[DOI perlu verifikasi di doi.org]\".\n4. Tautan data/grafik harus valid; jika ragu tandai untuk dilampirkan, JANGAN\n   mengarang URL atau angka.\n5. Bobot rubrik adalah penyelaras kriteria, BUKAN jaminan kelolosan.\n6. Pengungkapan AI (Seksi O.2) tetap wajib sebelum pengajuan.\n", "m12": "AKTIFKAN: MODUL 12 — PROPOSAL BRIN RIIM KOMPETISI\nTOPIK: [TOPIC_INPUT]\nSKEMA: RIIM Kompetisi (Riset dan Inovasi untuk Indonesia Maju)\n\n★ INSTRUKSI PEMBUKA — WAJIB DIBACA\n================================================================\nBaca dan susun secara logis, jaga integritas dan konsistensi, hindari\nhalusinasi dan data palsu. Istilah asing tidak diserap ditulis *miring* (PUBEI).\nGunakan hanya tanda baca: . , ; : - ? ! \" \" ' ' ( ) [ ] / ...\nTerapkan Protokol Gaya Penulisan Natural (Seksi P Core Layer). JANGAN mengklaim\nkeluaran \"bukan AI\" atau \"lolos detektor\". KODE SESI: [KODE]\n================================================================\n\n================================================================\nPROTOKOL KANVAS BARU (WAJIB) — MENJAGA BATAS/LIMIT\n================================================================\nATURAN INTI (tidak dapat dilanggar):\n1. SATU KANVAS = SATU SEGMEN. Jangan pernah menggabungkan dua segmen dalam satu\n   kanvas, dan jangan pernah menambahkan segmen baru ke kanvas yang sudah terisi.\n2. SEBELUM menulis segmen berikutnya, BUAT KANVAS/DOKUMEN BARU lebih dulu.\n   Beri judul kanvas dengan prefiks kode sesi, contoh: \"[KODE] - Segmen 2\".\n3. SELESAIKAN satu segmen penuh dalam satu kanvas. JANGAN memulai segmen\n   berikutnya pada respons yang sama; berhenti dan tunggu aba-aba \"LANJUT\".\n4. Jika ruang kanvas mulai menipis di TENGAH satu segmen, jangan memadatkan atau\n   memotong isi. Tutup dengan penanda \"[BERSAMBUNG — ketik LANJUT untuk sisa\n   segmen ini di kanvas baru]\" lalu lanjutkan sisanya di kanvas baru saat diminta.\n5. JANGAN menulis ulang segmen yang sudah selesai; cukup rujuk judulnya.\n\nPEMETAAN ISTILAH LINTAS-AI (gunakan sesuai platform):\n   ChatGPT -> buka Canvas baru   |  Claude -> buat Artifact baru\n   Gemini  -> buka Canvas baru    |  Lainnya -> buat dokumen/jawaban terpisah baru\nFALLBACK: jika platform TIDAK mendukung kanvas terpisah, tulis tiap segmen\nsebagai blok berjudul jelas yang dipisah garis pemisah, tetap berurutan, satu\nsegmen per respons.\n\nKONSISTENSI ANTAR-KANVAS (WAJIB sama di semua kanvas):\n   KODE SESI, penomoran makalah, glosarium Modul 1, skema/bidang, dan novelty\n   yang sudah dikunci. Akhiri tiap kanvas dengan:\n   \"=== AKHIR [nama segmen] === | Untuk lanjut di KANVAS BARU, ketik: LANJUT [nama segmen berikutnya]\"\n================================================================\nSEGMEN PER KANVAS (Modul 12 - Proposal BRIN RIIM):\n   Kanvas 1: Tarik-data (gap M4 + korpus M1) + Konfirmasi Novelty\n   Kanvas 2: Kerangka Berpikir + Nilai Strategis + Susunan Tim\n   Kanvas 3: Metode (diagram alir + novelty)\n   Kanvas 4: Luaran/Indikator Kinerja Riset + TKT\n   Kanvas 5: Jadwal + RAB + Uji Silang + Daftar Pustaka + Ringkasan +\n             Mitigasi Risiko + Gerbang Administratif\n================================================================\n================================================================\n\nPEMERIKSAAN PRA-KONDISI (WAJIB sebelum output)\n================================================================\n1. Modul 0-7 selesai? [Ya/Tidak]. Sumber data lanjutan, pilih SATU:\n     JALUR A -> Modul 8 (rencana Dataset)   : [Ya/Tidak]\n     JALUR B -> Modul 9 (rancangan Statistik): [Ya/Tidak]\n   Jika keduanya kosong: BERHENTI, minta pengguna jalankan Modul 8 atau 9.\n2. Baca BIDANG ILMU (Seksi L): Saintek/Ilmu Komputer -> Metode JALUR MODEL;\n   Umum/Sosial-Humaniora -> Metode JALUR SOSHUM.\n3. Baca MASA PENELITIAN (mono-tahun / multi-tahun, MAKSIMAL 3 TAHUN):\n   1 tahun -> 1 novelty ; multiyear -> 2 novelty.\n   [Semua ketentuan masa, dana, TKT, pagu, jumlah kata, peringkat jurnal WAJIB\n    ditandai: \"[verifikasi pedoman BRIN — pendanaan-risnov.brin.go.id]\"]\n\n================================================================\nCATATAN KEJUJURAN (WAJIB ditampilkan, jangan dihapus)\n================================================================\nModul ini membantu menyusun proposal RIIM Kompetisi agar sesuai pedoman dan\nkriteria penilaian. Modul ini TIDAK menjamin kelolosan; keputusan pendanaan\ntergantung kompetisi, kuota, rekam jejak pengusul, dan penilaian reviewer BRIN.\nKetua tim RIIM Kompetisi disyaratkan minimal berpendidikan S3 [verifikasi BRIN].\n\n================================================================\nWORKFLOW BERTAHAP — IKUTI URUTAN INI\n================================================================\n\nLANGKAH 0 — TARIK DATA DASAR (R1)\n   Tarik dan tampilkan untuk DIKOREKSI pengguna sebelum lanjut:\n   - KESENJANGAN (gap) dari Modul 4: [ringkas 2-3 gap utama]\n   - KORPUS dari Modul 1: [daftar sumber untuk daftar pustaka APA]\n   Minta pengguna mengonfirmasi atau mengoreksi gap dan korpus.\n   ATURAN: jangan mengarang gap baru; gunakan yang sudah tervalidasi di Modul 4.\n\nLANGKAH 1 — KONFIRMASI NOVELTY (INTERAKTIF)\n   Usulkan rumusan NOVELTY/kebaruan yang diturunkan dari gap (Langkah 0).\n   Tanyakan: \"Apakah novelty ini sudah tepat? (ya / revisi)\".\n   TUNGGU jawaban pengguna sebelum menyusun bab.\n   FALLBACK lintas-AI: jika pengguna menulis \"langsung saja\" atau platform tidak\n   mendukung jeda, gunakan novelty usulan dan tandai\n   \"[novelty usulan — mohon ditinjau]\". Lalu lanjutkan.\n\nLANGKAH 2 — SUSUN BAB BERURUTAN SESUAI PEDOMAN RIIM\n   (Susun lurus; novelty sudah dikunci di Langkah 1.)\n\n   2.1 JUDUL RISET\n       Spesifik, mencerminkan novelty, memuat objek dan pendekatan.\n\n   2.2 KERANGKA BERPIKIR DAN NILAI STRATEGIS\n       A. Kerangka Berpikir: arti penting riset, alur logika dari masalah ->\n          gap -> novelty -> tujuan.\n       B. Nilai Strategis (R3) — jawab pertanyaan pemandu:\n          - Apa potensi hilirisasi/pemanfaatan hasil riset?\n          - Apa dampaknya bagi prioritas/agenda riset nasional?\n          - Bagaimana keterhubungannya dengan tema fokus BRIN?\n       C. Tema Fokus BRIN (R7) — PILIH SATU tema utama lalu tulis satu paragraf\n          keterkaitan topik dengan tema tersebut. Daftar tema fokus (referensi):\n          pangan; kesehatan; energi; sosial-humaniora; hayati; lingkungan;\n          teknologi informasi; maritim; kebencanaan; sains lainnya.\n          [verifikasi daftar tema terbaru pada pedoman BRIN]\n\n   2.3 SUSUNAN TIM PERISET (R8)\n       Tabel A. Tim Periset\n       | Nama | Peran (Ketua/Anggota) | Kepakaran | Tugas/Tahap Metode | Alokasi (jam/minggu) |\n       |------|-----------------------|-----------|--------------------|----------------------|\n       Catatan: Ketua minimal S3 [verifikasi BRIN]; peran ditautkan ke tahapan\n       metode (2.4). Rekam jejak tim sesuai tema riset.\n\n   2.4 METODE\n       Wajib memuat metodologi pelaksanaan dan diagram alir; tiap tahap punya\n       penanggung jawab (lihat 2.3) dan terhubung ke luaran (2.5) dan RAB (2.8).\n\n       JALUR MODEL (Saintek/Ilmu Komputer):\n         Rancangan pengembangan model/metode; data dari JALUR A (Modul 8) atau\n         JALUR B (Modul 9). Sajikan ALGORITMA FLOWCHART (ASCII). Tandai kebaruan\n         (NOVELTY) dengan garis PUTUS-PUTUS BERWARNA di LUAR kotak proses:\n         - 1 NOVELTY jika 1 tahun; 2 NOVELTY jika multiyear.\n         Sebut warna penanda (mis. \"penanda merah\", \"penanda biru\").\n\n            +-----------------------------+\n            |  Input / Data ([M8 atau M9])|\n            +-----------------------------+\n                        |\n                        v\n            +-----------------------------+\n            |  Praproses                  |\n            +-----------------------------+\n                        |\n                        v\n            ...............................   <- NOVELTY 1 (penanda berwarna)\n            :  +-----------------------+  :\n            :  |  [Komponen kebaruan 1]|  :\n            :  +-----------------------+  :\n            ...............................\n                        |\n                        v\n            +-----------------------------+\n            |  Proses Inti                |\n            +-----------------------------+\n                        |\n                        v\n            ...............................   <- NOVELTY 2 (hanya jika multiyear)\n            :  +-----------------------+  :\n            :  |  [Komponen kebaruan 2]|  :\n            :  +-----------------------+  :\n            ...............................\n                        |\n                        v\n            +-----------------------------+\n            |  Evaluasi / Output          |\n            +-----------------------------+\n\n         Instruksi: AI tujuan boleh menggambar versi visual bila platform\n         mendukung; format gambar akhir dapat JPG/PNG saat disubmit.\n\n       JALUR SOSHUM (Umum/Sosial-Humaniora): pilih dari empat metode populer:\n         1 Kuantitatif (kuesioner; Regresi/SEM; SPSS/SmartPLS/Analisis Jalur)\n         2 Kualitatif (Etnografi/Fenomenologi; wawancara; observasi)\n         3 Humaniora (studi teks; hermeneutika; analisis wacana kritis)\n         4 Mixed Methods (gabungan angka dan narasi)\n\n   2.5 LUARAN DAN INDIKATOR KINERJA RISET (R2)\n       Luaran wajib RIIM: KTI (artikel jurnal internasional bereputasi)\n       dan/atau HKI; dapat dilengkapi produk/prototipe/model.\n       Ketentuan terverifikasi: penelitian 1 tahun minimal 1 artikel pada jurnal\n       internasional bereputasi peringkat sekurang-kurangnya Q3 atau setara\n       [verifikasi pedoman BRIN]. Untuk multiyear, target bertingkat per tahun.\n       Tabel B. Indikator Kinerja Riset\n       | Tahun | Jenis Luaran (KTI/HKI/Produk) | Target | Indikator | Status |\n       |-------|-------------------------------|--------|-----------|--------|\n\n   2.6 TINGKAT KESIAPTERAPAN TEKNOLOGI (TKT) (R6)\n       Tabel umum 9 tingkat (ringkas):\n       1 Prinsip dasar; 2 Formulasi konsep; 3 Pembuktian konsep;\n       4 Validasi lab; 5 Validasi lingkungan relevan; 6 Demonstrasi model/\n       prototipe di lingkungan relevan; 7 Prototipe di lingkungan sebenarnya;\n       8 Sistem lengkap dan handal; 9 Sistem teruji operasional.\n       Untuk RIIM Kompetisi, luaran umumnya pada rentang TKT 3-6\n       [verifikasi pedoman BRIN].\n       WAJIB: nyatakan TKT AWAL -> TKT TARGET dengan justifikasi realistis sesuai\n       durasi. Lompatan TKT yang tidak realistis untuk durasi singkat harus\n       dihindari (anti-overclaiming).\n\n   2.7 JADWAL PENELITIAN\n       Sesuaikan jumlah tahun (mono-tahun atau multiyear, MAKS 3 tahun).\n       Matriks bulanan per tahun: | No | Kegiatan | Bln 1..12 | (tandai X).\n\n   2.8 RENCANA ANGGARAN BIAYA (RAB) (R4)\n       Kerangka pos standar (angka ESTIMASI, bertanda verifikasi):\n       - Gaji/upah tim\n       - Bahan habis pakai\n       - Sewa peralatan/perjalanan\n       - Luaran/publikasi (biaya artikel, HKI)\n       ATURAN: tiap pos HARUS terhubung ke tahapan metode (2.4). Total RAB\n       dicocokkan dengan pagu skema [verifikasi pagu RIIM pada pedoman BRIN —\n       jangan mengarang nominal pagu].\n\n   2.9 UJI SILANG KELAYAKAN (R9)\n       Periksa dan tampilkan tabel konsistensi:\n       | Tahapan Metode | Luaran terkait | Pos RAB terkait | Konsisten? (ya/tidak) |\n       Jika ada baris \"tidak\": perbaiki sebelum lanjut. Tujuan: metode, luaran,\n       dan anggaran saling sinkron.\n\n   2.10 DAFTAR PUSTAKA (GAYA APA)\n        Sesuai pedoman RIIM, daftar pustaka disusun gaya APA. Gunakan sumber\n        dari korpus Modul 1. Validasi referensi mutakhir (R11): tandai persentase\n        pustaka terbitan 5 tahun terakhir; utamakan sumber primer dan mutakhir.\n        ANTI-FABRIKASI: DOI hanya dari korpus dan lengkap (https://doi.org/[DOI]);\n        jika ragu \"[DOI perlu verifikasi di doi.org]\". JANGAN mengarang sumber.\n\n   2.11 RINGKASAN DAN KATA KUNCI (DISUSUN TERAKHIR) (R10)\n        Susun SETELAH semua bab selesai, dirangkum dari isi final (bukan ditebak\n        di awal). Ringkasan memuat tujuan, target, metode, dan luaran utama.\n        Kata kunci: maksimal 5, dipisahkan titik koma.\n        Catatan: di dokumen final, Ringkasan tetap diletakkan di bagian atas\n        proposal, tetapi PENYUSUNANNYA dilakukan terakhir agar akurat.\n\n   2.12 MITIGASI RISIKO RISET (R13)\n        Sajikan ringkas:\n        | Risiko Utama | Dampak | Rencana Mitigasi |\n        Tujuan: menunjukkan antisipasi dan kelayakan pelaksanaan.\n\nLANGKAH 3 — GERBANG KUALITAS DAN ADMINISTRATIF\n\n   GERBANG KUALITAS SUBSTANSI (WAJIB sebelum kirim):\n   G1 : Sumber jelas dari Modul 8 ATAU Modul 9?\n   G2 : Gap (M4) dan korpus (M1) ditarik dan dikonfirmasi (Langkah 0)?\n   G3 : Novelty dikonfirmasi/ditandai usulan (Langkah 1)?\n   G4 : Kerangka Berpikir dan Nilai Strategis lengkap; tema fokus BRIN dipilih?\n   G5 : Susunan tim ditautkan ke tahapan metode; ketua S3 [verifikasi]?\n   G6 : Metode sesuai bidang (flowchart+novelty / 4 metode soshum)?\n   G7 : Jumlah novelty sesuai masa (1 tahun=1; multiyear=2), penanda berwarna?\n   G8 : Tabel IKR per tahun (KTI/HKI), 1 tahun -> artikel Q3+ [verifikasi]?\n   G9 : TKT awal->target (rentang 3-6) realistis [verifikasi]?\n   G10: Jadwal sesuai durasi (maks 3 tahun)?\n   G11: RAB pos standar, tiap pos terhubung metode; pagu bertanda verifikasi?\n   G12: Uji silang metode-luaran-RAB konsisten (R9)?\n   G13: Daftar pustaka APA; anti-fabrikasi DOI; mutakhir 5 tahun ditandai (R11)?\n   G14: Ringkasan disusun terakhir, dari isi final (R10)?\n   G15: Mitigasi risiko ada (R13)?\n   G16: Tiap segmen pada KANVAS BARU terpisah dengan penanda lanjut?\n   G17: PUBEI dan Gaya Natural (Seksi P) diterapkan; tanda baca sesuai himpunan?\n\n   GERBANG KESIAPAN ADMINISTRATIF (R5) — pengingat, BUKAN jaminan lolos:\n   - Ketua tim berpendidikan minimal S3? [verifikasi BRIN]\n   - Rekam jejak tim sesuai tema riset?\n   - Keterlibatan periset tidak melebihi batas (mis. maksimal 2 proposal)?\n     [verifikasi pedoman BRIN]\n   - CV lengkap tim peneliti dan Usulan Rencana Anggaran disiapkan?\n   - Proposal disusun sesuai pedoman teknis dan diunggah via\n     https://pendanaan-risnov.brin.go.id ?\n\nJika ada gerbang gagal: perbaiki sebelum kirim, catat\n\"KOREKSI OTOMATIS DITERAPKAN: [deskripsi]\".\n\n================================================================\nATURAN ANTI-HALUSINASI (WAJIB)\n================================================================\n1. Sitasi [Pengarang, Tahun] merujuk korpus Modul 1; daftar pustaka gaya APA.\n2. Angka (kata, dana, RAB, pagu, TKT, masa, peringkat jurnal) ditandai\n   verifikasi pedoman BRIN.\n3. DOI hanya dari korpus; jika ragu \"[DOI perlu verifikasi di doi.org]\".\n4. Komponen novelty pada flowchart harus kontribusi nyata, bukan placeholder.\n5. Indikator kinerja, gerbang administratif, dan TKT adalah alat bantu/pengingat,\n   BUKAN jaminan kelolosan.\n6. Pengungkapan AI (Seksi O.2) tetap wajib sebel N memunculkan kerangka Bab 4 dan Bab 5.\n\nKONSISTENSI ANTAR-KANVAS (WAJIB sama di semua kanvas):\n   KODE SESI, penomoran, GLOSARIUM Modul 1, bidang, jenis penelitian, dan\n   rumusan masalah yang sudah dikunci. Akhiri tiap kanvas:\n   \"=== AKHIR [Bab N] === | Untuk lanjut di KANVAS BARU, ketik: LANJUT Bab [N+1]\"\n================================================================\n\nPEMERIKSAAN PRA-KONDISI (WAJIB sebelum output)\n================================================================\n1. Modul 0-7 selesai? [Ya/Tidak]. Sumber data lanjutan, pilih SATU:\n     JALUR A -> Modul 8 (rencana Dataset)   : [Ya/Tidak]\n     JALUR B -> Modul 9 (rancangan Statistik): [Ya/Tidak]\n   Jika keduanya kosong: BERHENTI, minta pengguna jalankan Modul 8 atau 9.\n2. Baca TAHAP (pilihan pengguna):\n     ( ) TAHAP 1 — Seminar Proposal (Bab 1-3)\n     ( ) TAHAP 2 — Seminar Hasil (Bab 1-5)\n3. Baca BIDANG ILMU (Seksi L): Saintek/Ilmu Komputer -> Metode JALUR MODEL;\n   Umum/Sosial-Humaniora -> Metode JALUR SOSHUM.\n4. Baca JENIS PENELITIAN (R3): Kuantitatif / Kualitatif / Pengembangan (R&D).\n   Jenis ini menentukan Bab 3 dan bentuk Bab 5.\n\n================================================================\nCATATAN KEJUJURAN (WAJIB ditampilkan)\n================================================================\nModul ini membantu menyusun draf proposal/laporan skripsi sesuai struktur lazim.\nStandar rinci (jumlah halaman, format sampul, gaya) berbeda tiap kampus/prodi;\nbagian seperti itu ditandai \"[sesuaikan panduan kampus]\". Modul ini alat bantu,\nBUKAN jaminan lulus seminar. Pengungkapan AI (Seksi O.2) tetap wajib.\n\n================================================================\nBAB 1 — PENDAHULUAN  (Kanvas 1)\n================================================================\n1.1 Latar Belakang\n    [Uraian fenomena, urgensi, kesenjangan (rujuk Modul 4); sitasi APA dari\n     korpus Modul 1. Jika perlu data/grafik, lampirkan sumber valid; jika ragu\n     tandai \"[sumber data perlu dilampirkan]\" — jangan mengarang.]\n1.2 Rumusan Masalah\n    [Tulis sebagai daftar pertanyaan penelitian. Beri nomor RM1, RM2, ...\n     INI MENJADI BENANG MERAH (R2): tiap RM wajib dijawab di Bab 4 dan\n     disimpulkan di Bab 5.]\n1.3 Batasan Masalah\n1.4 Tujuan Penelitian   [selaras dengan tiap rumusan masalah]\n1.5 Manfaat Penelitian  [teoretis dan praktis]\n1.6 Sistematika Penulisan  [uraikan ringkas isi Bab I sampai Bab V]\n\n================================================================\nBAB 2 — KAJIAN PUSTAKA / LANDASAN TEORI  (Kanvas 2)\n================================================================\nSusun dengan heading dan 4 sub-heading terstruktur, sitasi gaya APA (untuk\nkemudahan reference manager). Teori harus selaras dengan latar belakang,\nrumusan masalah, dan batasan masalah (Bab 1).\n\nATURAN SUMBER SITASI BAB 2 (WAJIB):\n- Komposisi: MINIMAL 70% sumber dari jurnal terindeks SINTA (peringkat SINTA 1\n  sampai SINTA 5), dan MAKSIMAL 30% dari jurnal internasional bereputasi\n  (Scopus Q3, Q4, atau IEEE). Komposisi bersifat fleksibel selama 70/30 terjaga.\n- Utamakan jurnal OPEN ACCESS agar tautan dapat diakses pembaca.\n- Setiap entri sebaiknya menyertakan DOI dan tautan akses.\n  ATURAN ANTI-FABRIKASI (TIDAK DAPAT DILANGGAR):\n    * DOI dan tautan HANYA dicantumkan jika berasal dari korpus Modul 1 dan\n      lengkap; format DOI: https://doi.org/[DOI].\n    * Jika DOI/tautan tidak tersedia atau tidak yakin: tulis\n      \"[DOI perlu verifikasi di doi.org]\" dan \"[tautan akses perlu diverifikasi]\".\n    * JANGAN PERNAH mengarang DOI, tautan, peringkat SINTA, atau status open\n      access. AI tidak dapat menjamin keaktifan DOI maupun keterbukaan akses;\n      verifikasi akhir adalah tanggung jawab penulis.\n- Untuk tiap sumber, beri penanda ringkas jenisnya, contoh:\n  \"[SINTA 2, open access]\" atau \"[Scopus Q4 / IEEE, perlu verifikasi]\".\n- Jika korpus Modul 1 belum memenuhi komposisi 70/30: JANGAN mengarang sumber\n  tambahan; tandai \"[perlu tambahan sumber SINTA/internasional sesuai komposisi]\"\n  agar penulis melengkapinya secara manual.\n\n2.1 [Heading Teori Utama]\n    [Uraian teori naratif penuh dengan sitasi APA.]\n    Literature Questions (memperkuat teori bagian ini):\n    1-5. [Lima pertanyaan literatur Bahasa Inggris — bagian naskah.]\n\n    2.1.1 [Sub-heading 1]\n        [Uraian teori.]\n        Literature Questions: 1-5. [Lima pertanyaan Bahasa Inggris.]\n    2.1.2 [Sub-heading 2]\n        [Uraian teori.]\n        Literature Questions: 1-5. [Lima pertanyaan Bahasa Inggris.]\n    2.1.3 [Sub-heading 3]\n        [Uraian teori.]\n        Literature Questions: 1-5. [Lima pertanyaan Bahasa Inggris.]\n    2.1.4 [Sub-heading 4]\n        [Uraian teori.]\n        Literature Questions: 1-5. [Lima pertanyaan Bahasa Inggris.]\n\n    [Catatan: pertanyaan literatur di tiap heading dan sub-heading adalah bagian\n     naskah kajian pustaka, sesuai pilihan pengguna. Konsistensi istilah mengikuti\n     GLOSARIUM Modul 1 (R4).]\n\nKONSISTENSI SITASI (R8): pastikan SETIAP sumber yang disitasi di Bab 2 muncul di\nDaftar Pustaka, dan SETIAP entri Daftar Pustaka memang disitasi. Tidak ada\nsitasi tanpa entri, tidak ada entri tanpa sitasi.\n\nGERBANG KOMPOSISI SUMBER BAB 2 (periksa sebelum lanjut):\n- Apakah minimal 70% sumber terindeks SINTA (1-5) dan maksimal 30% internasional\n  (Q3/Q4/IEEE)? Jika belum: tandai untuk dilengkapi, JANGAN mengarang sumber.\n- Apakah DOI/tautan hanya dari korpus, dan yang tidak yakin sudah ditandai\n  verifikasi? Tidak boleh ada DOI/tautan/peringkat/status open access fabrikasi.\n\n================================================================\nBAB 3 — METODOLOGI PENELITIAN  (Kanvas 3)\n================================================================\nSelaras dengan Bab 1 dan Bab 2. Bercabang BIDANG dan JENIS PENELITIAN (R3).\n\n3.1 Jenis dan Pendekatan Penelitian\n    JIKA Kuantitatif:\n        - Populasi dan sampel; teknik sampling\n        - Instrumen; uji validitas dan reliabilitas\n        - Teknik analisis (statistik) — dari rancangan Modul 9 bila dipilih\n    JIKA Kualitatif:\n        - Informan/subjek; teknik pengumpulan (wawancara, observasi, dokumen)\n        - Keabsahan data (triangulasi)\n        - Teknik analisis (reduksi, penyajian, penarikan simpulan)\n    JIKA Pengembangan (R&D):\n        - Model pengembangan; tahap-tahap; subjek uji coba\n        - Instrumen kelayakan; analisis data\n\n3.2 Desain / Prosedur Penelitian\n    JALUR MODEL (Saintek/Ilmu Komputer): sajikan ALGORITMA FLOWCHART (ASCII);\n       data dari JALUR A (Modul 8) atau JALUR B (Modul 9). Instruksi: AI tujuan\n       boleh menggambar versi visual bila platform mendukung.\n    JALUR SOSHUM (Umum/Sosial-Humaniora): uraikan prosedur sesuai jenis di 3.1.\n\n3.3 Alat dan Bahan Penelitian\n    [Perangkat keras/lunak, instrumen, atau bahan; sesuaikan bidang.]\n\n3.4 Tahapan Penelitian\n    [Langkah berurutan; tautkan ke rumusan masalah.]\n\n[JIKA TAHAP 1 (Seminar Proposal): SELESAI sampai Bab 3.\n Bab 4 dan Bab 5 TIDAK dimunculkan.]\n\n================================================================\nBAB 4 — HASIL DAN PEMBAHASAN  (Kanvas 4 — hanya TAHAP 2)\n================================================================\nMenjawab Bab 1-3. ANTI-FABRIKASI: gunakan kerangka, jangan mengarang angka.\n\n4.1 [Hasil menjawab RM1]\n    [Sajikan hasil; tempat data: \"[isi dari hasil penelitian Anda]\".\n     Tabel/gambar diberi keterangan; jika angka belum ada, tandai jelas.]\n4.2 [Hasil menjawab RM2]   [pola sama; satu sub-bab per rumusan masalah - R2]\n4.3 Pembahasan\n    [Interpretasi hasil dikaitkan teori Bab 2 dan metode Bab 3.]\n\n================================================================\nBAB 5 — PENUTUP  (Kanvas 5 — hanya TAHAP 2)\n================================================================\n5.1 Kesimpulan\n    [Jawaban ringkas atas TIAP rumusan masalah (R2). Bentuk menyesuaikan jenis:\n       Kuantitatif -> sertakan data angka hasil (mis. nilai uji, koefisien,\n         persentase); jika belum ada tandai \"[isi dari hasil penelitian Anda]\".\n       Kualitatif  -> sajikan temuan tematik utama, bukan angka.\n     Jangan mengarang angka.]\n5.2 Saran\n    [Saran teoretis dan praktis; saran untuk penelitian lanjutan.]\n\n================================================================\nDAFTAR PUSTAKA (Gaya APA)\n================================================================\nHanya pustaka yang disitasi. Gaya APA untuk kemudahan reference manager.\nANTI-FABRIKASI: sumber dari korpus Modul 0/1; DOI dicantumkan hanya jika dari\nkorpus dan lengkap (https://doi.org/[DOI]); jika ragu \"[DOI perlu verifikasi di\ndoi.org]\". Patuhi konsistensi sitasi R8 (Bab 2 <-> Daftar Pustaka).\n\n================================================================\nGERBANG KELENGKAPAN PER TAHAP (R5) — alat bantu, BUKAN jaminan lulus seminar\n================================================================\nTAHAP 1 (Seminar Proposal):\n   T1-1: Bab 1 lengkap (latar, RM, batasan, tujuan, manfaat, sistematika)?\n   T1-2: Bab 2 punya heading + 4 sub-heading, tiap bagian 5 pertanyaan (Inggris)?\n   T1-3: Bab 3 sesuai jenis penelitian dan bidang; selaras Bab 1-2?\n   T1-4: Tujuan selaras dengan tiap rumusan masalah?\n   T1-5: Konsistensi sitasi Bab 2 <-> Daftar Pustaka (R8)?\n   T1-6: Komposisi sumber Bab 2 minimal 70% SINTA, maksimal 30% internasional;\n         DOI/tautan tidak ada yang fabrikasi (ditandai verifikasi bila ragu)?\nTAHAP 2 (Seminar Hasil):\n   T2-1: Semua gerbang Tahap 1 terpenuhi?\n   T2-2: Bab 4 menjawab TIAP rumusan masalah (RM1->4.1, dst) (R2)?\n   T2-3: Bab 5 menyimpulkan tiap RM; bentuk sesuai jenis (angka/tematik)?\n   T2-4: Tidak ada angka fabrikasi; data kosong ditandai jelas?\nGERBANG UMUM:\n   G-A: Tiap bab pada KANVAS BARU terpisah; pembagian sesuai tahap?\n   G-B: Glosarium dan istilah konsisten lintas-bab (R4)?\n   G-C: PUBEI dan Gaya Natural (Seksi P); tanda baca sesuai himpunan?\nJika ada gerbang gag
